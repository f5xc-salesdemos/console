---
name: Validate Catalog

on:
  # Runs on every PR (no paths filter) so the "Validate Catalog Schemas"
  # status check always reports. It is a required check in branch
  # protection, and a path-filtered required check never reports on PRs
  # that don't touch catalog/schemas/tools (e.g. governance/config syncs),
  # which leaves those PRs permanently unmergeable.
  pull_request:
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "schemas/**"
      - "tools/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Catalog Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Validate catalog against schemas
        run: npm run validate
