name: Validate Catalog

on:
  pull_request:
    paths:
      - "catalog/**"
      - "schemas/**"
      - "tools/**"
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "schemas/**"
      - "tools/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Catalog Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Validate catalog against schemas
        run: npm run validate
