schema: "urn:f5xc:console:navigation:v1"
console_version: "2025.06"
discovered_at: "2026-06-15"

tree:
  - id: "load-balancers"
    label: "Load Balancers"
    menu_path: ["Manage", "Load Balancers"]
    children:
      - id: "http-load-balancers"
        label: "HTTP Load Balancers"
        menu_path: ["Manage", "Load Balancers", "HTTP Load Balancers"]
        route: "/web/load-balancers/http"
        route_file: "routes/load-balancers/http-load-balancers.yaml"
      - id: "tcp-load-balancers"
        label: "TCP Load Balancers"
        menu_path: ["Manage", "Load Balancers", "TCP Load Balancers"]
        route: "/web/load-balancers/tcp"
        route_file: "routes/load-balancers/tcp-load-balancers.yaml"
      - id: "origin-pools"
        label: "Origin Pools"
        menu_path: ["Manage", "Load Balancers", "Origin Pools"]
        route: "/web/load-balancers/origin-pools"
        route_file: "routes/load-balancers/origin-pools.yaml"
      - id: "health-checks"
        label: "Health Checks"
        menu_path: ["Manage", "Load Balancers", "Health Checks"]
        route: "/web/load-balancers/health-checks"
        route_file: "routes/load-balancers/health-checks.yaml"

  - id: "security"
    label: "Security"
    menu_path: ["Manage", "Security"]
    children:
      - id: "app-firewalls"
        label: "App Firewalls"
        menu_path: ["Manage", "Security", "App Firewalls"]
