  - id: "networking"
    label: "Networking"
    menu_path: ["Manage", "Networking"]
    children:
      - id: "sites"
        label: "Sites"
        menu_path: ["Manage", "Networking", "Sites"]
        route: "/web/networking/sites"
        route_file: "routes/networking/sites.yaml"
