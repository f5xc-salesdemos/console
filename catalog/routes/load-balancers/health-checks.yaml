schema: "urn:f5xc:console:route:v1"
id: "health-checks"
label: "Health Checks"

route:
  pattern: "/web/namespace/{namespace}/load-balancers/health-checks"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Load Balancers", "Health Checks"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"

screen:
  type: "list"
  description: "Table listing all Health Checks in the selected namespace"
  primary_resource: "health-check"

  controls:
    - id: "add-btn"
      type: "button"
      label: "Add Health Check"
      action: "create"
      selector: "[data-testid='add-health-check']"
    - id: "search"
      type: "search-input"
      label: "Search"
      selector: "[data-testid='search-input']"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"
      selector: "[data-testid='namespace-selector']"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "type"
        label: "Type"
      - id: "interval"
        label: "Interval"
      - id: "timeout"
        label: "Timeout"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/namespace/{namespace}/load-balancers/health-checks/{name}"

operations:
  - type: "create"
    workflow: "workflows/health-check/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/health-check/delete.yaml"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Selectors are placeholders — will be validated via browser-first discovery"
