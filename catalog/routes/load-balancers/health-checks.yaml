schema: "urn:xcsh:console:route:v1"
id: "health-checks"
label: "Health Checks"

route:
  pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "Load Balancers", "Health Checks"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "web-app-and-api-protection"

screen:
  type: "list"
  description: "Table listing all Health Checks in the selected namespace"
  primary_resource: "health-check"

  form_tabs: ["Form", "Documentation", "JSON"]
  form_note: "Create form opens inline on the same page when the Add tab is clicked"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add Health Check"
      action: "create"
      selector: "tab:text('Add Health Check')"
      note: "This is a tab element, not a button. Clicking it opens the create form inline."
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "namespace"
        label: "Namespace"
      - id: "interval"
        label: "Interval"
      - id: "jitter_percent"
        label: "Jitter Percent"
      - id: "timeout"
        label: "Timeout"
      - id: "unhealthy_threshold"
        label: "Unhealthy Threshold"
      - id: "healthy_threshold"
        label: "Healthy Threshold"
      - id: "actions"
        label: "Actions"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks/{name}"

operations:
  - type: "create"
    workflow: "workflows/health-check/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/health-check/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern and screen structure validated via live browser session. Add action is a tab, not a button. Table columns from discovery: Name, Namespace, Interval, Jitter Percent, Timeout, Unhealthy Threshold, Healthy Threshold, Actions."
