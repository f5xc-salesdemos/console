schema: "urn:f5xc:console:route:v1"
id: "health-checks"
label: "Health Checks"

route:
  pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "Load Balancers", "Health Checks"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "web-app-and-api-protection"

screen:
  type: "list"
  description: "Table listing all Health Checks in the selected namespace"
  primary_resource: "health-check"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add Health Check"
      action: "create"
      selector: "tab:text('Add Health Check')"
      note: "Add action is a tab element, consistent with other list pages"
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "type"
        label: "Type"
      - id: "interval"
        label: "Interval"
      - id: "timeout"
        label: "Timeout"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks/{name}"

operations:
  - type: "create"
    workflow: "workflows/health-check/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/health-check/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern validated via live browser session. URL follows workspace-scoped pattern."
