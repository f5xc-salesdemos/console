schema: "urn:xcsh:console:route:v1"
id: "http-load-balancers"
label: "HTTP Load Balancers"

route:
  pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/http_loadbalancers"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "Load Balancers", "HTTP Load Balancers"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "web-app-and-api-protection"

screen:
  type: "list"
  description: "Table listing all HTTP Load Balancers in the selected namespace"
  primary_resource: "http-load-balancer"

  form_tabs: ["Form", "Documentation", "JSON"]
  form_note: "Create form opens inline on the same page when the Add tab is clicked"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add HTTP Load Balancer"
      action: "create"
      selector: "tab:text('Add HTTP Load Balancer')"
      note: "This is a tab element, not a button. Clicking it opens the create form inline."
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "domains"
        label: "Domains"
      - id: "origin-pools"
        label: "Origin Pools"
      - id: "advertise-policy"
        label: "Advertise Policy"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"
      - id: "clone"
        label: "Clone"
        operation: "clone"

  detail_route: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/http_loadbalancers/{name}"

operations:
  - type: "create"
    workflow: "workflows/http-load-balancer/create.yaml"
  - type: "list"
    inline: true
  - type: "read"
    workflow: "workflows/http-load-balancer/view.yaml"
  - type: "update"
    workflow: "workflows/http-load-balancer/edit.yaml"
  - type: "delete"
    workflow: "workflows/http-load-balancer/delete.yaml"
  - type: "clone"
    workflow: "workflows/http-load-balancer/clone.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern and screen structure validated via live browser session. Add action is a tab, not a button."
