schema: "urn:f5xc:console:route:v1"
id: "http-load-balancers"
label: "HTTP Load Balancers"

route:
  pattern: "/web/namespace/{namespace}/load-balancers/http"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Load Balancers", "HTTP Load Balancers"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"

screen:
  type: "list"
  description: "Table listing all HTTP Load Balancers in the selected namespace"
  primary_resource: "http-load-balancer"

  controls:
    - id: "add-btn"
      type: "button"
      label: "Add HTTP Load Balancer"
      action: "create"
      selector: "[data-testid='add-http-lb']"
    - id: "search"
      type: "search-input"
      label: "Search"
      selector: "[data-testid='search-input']"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"
      selector: "[data-testid='namespace-selector']"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "domains"
        label: "Domains"
      - id: "origin-pools"
        label: "Origin Pools"
      - id: "advertise-policy"
        label: "Advertise Policy"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"
      - id: "clone"
        label: "Clone"
        operation: "clone"

  detail_route: "/web/namespace/{namespace}/load-balancers/http/{name}"

operations:
  - type: "create"
    workflow: "workflows/http-load-balancer/create.yaml"
  - type: "list"
    inline: true
  - type: "read"
    workflow: "workflows/http-load-balancer/view.yaml"
  - type: "update"
    workflow: "workflows/http-load-balancer/edit.yaml"
  - type: "delete"
    workflow: "workflows/http-load-balancer/delete.yaml"
  - type: "clone"
    workflow: "workflows/http-load-balancer/clone.yaml"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Selectors are placeholders — will be validated via browser-first discovery"
