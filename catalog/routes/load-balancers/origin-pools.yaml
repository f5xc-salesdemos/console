schema: "urn:f5xc:console:route:v1"
id: "origin-pools"
label: "Origin Pools"

route:
  pattern: "/web/namespace/{namespace}/load-balancers/origin-pools"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Load Balancers", "Origin Pools"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"

screen:
  type: "list"
  description: "Table listing all Origin Pools in the selected namespace"
  primary_resource: "origin-pool"

  controls:
    - id: "add-btn"
      type: "button"
      label: "Add Origin Pool"
      action: "create"
      selector: "[data-testid='add-origin-pool']"
    - id: "search"
      type: "search-input"
      label: "Search"
      selector: "[data-testid='search-input']"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"
      selector: "[data-testid='namespace-selector']"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "origin-servers"
        label: "Origin Servers"
      - id: "health-check"
        label: "Health Check"
      - id: "algorithm"
        label: "Load Balancing Algorithm"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/namespace/{namespace}/load-balancers/origin-pools/{name}"

operations:
  - type: "create"
    workflow: "workflows/origin-pool/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/origin-pool/delete.yaml"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Selectors are placeholders — will be validated via browser-first discovery"
