schema: "urn:xcsh:console:route:v1"
id: "routes"
label: "Routes"

route:
  pattern: "/web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/routes"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Multi-Cloud App Connect", "{namespace}", "Manage", "Virtual Host", "Routes"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "multi-cloud-app-connect"

screen:
  type: "list"
  description: "Table listing all Routes in the selected namespace"
  primary_resource: "route-object"

  form_tabs: ["Form", "Documentation", "JSON"]
  form_note: "Create form opens inline on the same page when the Add tab is clicked"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add Route"
      action: "create"
      selector: "tab:text('Add Route')"
      note: "This is a tab element, not a button. Clicking it opens the create form inline."
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "match-path"
        label: "Match Path"
      - id: "action"
        label: "Action"
      - id: "destinations"
        label: "Destinations"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/routes/{name}"

operations:
  - type: "create"
    workflow: "workflows/route-object/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/route-object/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern validated via live browser session. Add action is a tab, not a button."
