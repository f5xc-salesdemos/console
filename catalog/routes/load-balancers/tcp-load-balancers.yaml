schema: "urn:xcsh:console:route:v1"
id: "tcp-load-balancers"
label: "TCP Load Balancers"

route:
  pattern: "/web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/tcp_loadbalancers"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Multi-Cloud App Connect", "{namespace}", "Manage", "Load Balancers", "TCP Load Balancers"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "multi-cloud-app-connect"

screen:
  type: "list"
  description: "Table listing all TCP Load Balancers in the selected namespace"
  primary_resource: "tcp-load-balancer"

  form_tabs: ["Form", "Documentation", "JSON"]
  form_note: "Create form opens inline on the same page when the Add tab is clicked"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add TCP Load Balancer"
      action: "create"
      selector: "tab:text('Add TCP Load Balancer')"
      note: "This is a tab element, not a button. Clicking it opens the create form inline."
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "listen-port"
        label: "Listen Port"
      - id: "origin-pools"
        label: "Origin Pools"
      - id: "sni"
        label: "SNI"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/tcp_loadbalancers/{name}"

operations:
  - type: "create"
    workflow: "workflows/tcp-load-balancer/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/tcp-load-balancer/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern and screen structure validated via live browser session. Add action is a tab, not a button."
