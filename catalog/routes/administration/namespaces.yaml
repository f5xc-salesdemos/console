schema: "urn:xcsh:console:route:v1"
id: "namespaces"
label: "Namespaces"

route:
  pattern: "/web/workspaces/administration/personal-management/namespaces"
  params: {}
  supports_direct_link: true
  breadcrumbs: ["Home", "Administration", "Personal Management", "My Namespaces"]

context:
  requires_login: true
  requires_namespace: false
  minimum_role: "admin"
  workspace: "administration"

screen:
  type: "list"
  description: "Table listing all Namespaces accessible to the current user"
  primary_resource: "namespace"

  form_tabs: ["Form", "Documentation", "JSON"]
  form_note: "Create form opens inline on the same page when the Add tab is clicked"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add Namespace"
      action: "create"
      selector: "tab:text('Add Namespace')"
      note: "This is a tab element, not a button. Clicking it opens the create form inline."
    - id: "search"
      type: "search-input"
      label: "Search"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "description"
        label: "Description"
      - id: "iam-users"
        label: "IAM Users"
      - id: "type"
        label: "Type"
      - id: "actions"
        label: "Actions"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/administration/personal-management/namespaces/{name}"

operations:
  - type: "create"
    workflow: "workflows/namespace/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/namespace/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "System-level resource — no namespace-selector control or namespace param. Route pattern and table columns validated via live browser session."
