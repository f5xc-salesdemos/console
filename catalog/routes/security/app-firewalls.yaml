schema: "urn:f5xc:console:route:v1"
id: "app-firewalls"
label: "App Firewalls"

route:
  pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/app_firewall"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "App Firewall"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"
  workspace: "web-app-and-api-protection"

screen:
  type: "list"
  description: "Table listing all App Firewalls in the selected namespace"
  primary_resource: "app-firewall"

  controls:
    - id: "add-tab"
      type: "tab"
      label: "Add App Firewall"
      action: "create"
      selector: "tab:text('Add App Firewall')"
      note: "Add action is a tab element, consistent with other list pages"
    - id: "search"
      type: "search-input"
      label: "Search"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "enforcement-mode"
        label: "Enforcement Mode"
      - id: "detection-settings"
        label: "Detection Settings"
      - id: "bot-defense"
        label: "Bot Defense"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/app_firewall/{name}"

operations:
  - type: "create"
    workflow: "workflows/app-firewall/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/app-firewall/delete.yaml"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Route pattern validated via live browser session. URL follows workspace-scoped pattern."
