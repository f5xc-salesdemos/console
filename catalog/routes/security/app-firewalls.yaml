schema: "urn:f5xc:console:route:v1"
id: "app-firewalls"
label: "App Firewalls"

route:
  pattern: "/web/namespace/{namespace}/security/app-firewalls"
  params:
    namespace:
      required: true
      description: "F5 XC namespace"
      example: "demo"
  supports_direct_link: true
  breadcrumbs: ["Home", "Security", "App Firewalls"]

context:
  requires_login: true
  requires_namespace: true
  minimum_role: "admin"

screen:
  type: "list"
  description: "Table listing all App Firewalls in the selected namespace"
  primary_resource: "app-firewall"

  controls:
    - id: "add-btn"
      type: "button"
      label: "Add App Firewall"
      action: "create"
      selector: "[data-testid='add-app-firewall']"
    - id: "search"
      type: "search-input"
      label: "Search"
      selector: "[data-testid='search-input']"
    - id: "namespace-selector"
      type: "dropdown"
      label: "Namespace"
      selector: "[data-testid='namespace-selector']"

  table:
    columns:
      - id: "name"
        label: "Name"
        sortable: true
        links_to: "detail"
      - id: "enforcement-mode"
        label: "Enforcement Mode"
      - id: "detection-settings"
        label: "Detection Settings"
      - id: "bot-defense"
        label: "Bot Defense"
      - id: "status"
        label: "Status"
    row_actions:
      - id: "edit"
        label: "Edit"
        operation: "update"
      - id: "delete"
        label: "Delete"
        operation: "delete"

  detail_route: "/web/namespace/{namespace}/security/app-firewalls/{name}"

operations:
  - type: "create"
    workflow: "workflows/app-firewall/create.yaml"
  - type: "list"
    inline: true
  - type: "delete"
    workflow: "workflows/app-firewall/delete.yaml"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  notes: "Selectors are placeholders — will be validated via browser-first discovery"
