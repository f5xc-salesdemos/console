schema: urn:xcsh:console:workflow:v1
id: site-mesh-group-create
label: Create Site Mesh Groups
resource: site-mesh-group
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Site Mesh Groups name (lowercase alphanumeric and hyphens)
    example: example-site-mesh-group
  bfd_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/site_to_site_connectivity/site_mesh_groups
    wait_for: text('Site Mesh Groups')
    description: Navigate to Site Mesh Groups list page
  - id: click-add-tab
    action: click
    selector: text('Add Site Mesh Group')
    wait_for: textbox[name='Name']
    description: Click Add Site Mesh Group to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-bfd_choice
    action: select
    selector: listbox
    context: Bfd Choice section
    value: "{bfd_choice}"
    description: Select Bfd Choice
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
