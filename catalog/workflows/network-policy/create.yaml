schema: urn:f5xc:console:workflow:v1
id: network-policy-create
label: Create Network Policies
resource: network-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Policies name (lowercase alphanumeric and hyphens)
    example: example-network-policy
  endpoint:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/manage/network_policies/network_policies
    wait_for: text('Network Policies')
    description: Navigate to Network Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Network Policy')
    wait_for: textbox[name='Name']
    description: Click the Add Network Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-endpoint
    action: click
    selector: button:text('Configure')
    context: Endpoint section
    description: Open the Endpoint configuration (required)
  - id: fill-endpoint-value
    action: fill
    selector: textbox
    value: "{endpoint}"
    description: Fill the required field inside the Endpoint configuration. The agent provides this via the 'endpoint' parameter.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
