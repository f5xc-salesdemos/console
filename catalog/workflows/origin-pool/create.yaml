schema: "urn:f5xc:console:workflow:v1"
id: "origin-pool-create"
label: "Create Origin Pool"
resource: "origin-pool"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Origin pool name (lowercase alphanumeric and hyphens)"
    example: "my-origin-pool"
  origin_server:
    required: true
    description: "IP address or DNS name of the origin server"
    example: "10.0.0.1"
  port:
    required: true
    type: "number"
    description: "Port number for the origin server"
    example: 8080
  health_check:
    required: false
    description: "Existing health check name to attach"
    example: "my-health-check"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/load-balancers/origin-pools"
    wait_for: "[data-testid='add-origin-pool']"
    description: "Navigate to Origin Pools list page"

  - id: "click-add"
    action: "click"
    selector: "[data-testid='add-origin-pool']"
    wait_for: "input[data-testid='name-input']"
    description: "Click Add Origin Pool button to open the create form"

  - id: "fill-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: "{name}"
    description: "Enter the origin pool name"

  - id: "add-origin-server"
    action: "click"
    selector: "[data-testid='add-origin-server']"
    wait_for: "[data-testid='origin-server-input']"
    description: "Open the origin server entry form"
    then:
      - id: "fill-origin-server"
        action: "fill"
        selector: "[data-testid='origin-server-input']"
        value: "{origin_server}"
        description: "Enter the origin server address"

      - id: "fill-port"
        action: "fill"
        selector: "[data-testid='port-input']"
        value: "{port}"
        description: "Enter the origin server port"

      - id: "apply-origin-server"
        action: "click"
        selector: "[data-testid='apply-btn']"
        wait_for: "[data-testid='origin-server-row']"
        description: "Confirm origin server entry"

  - id: "attach-health-check"
    condition: "params.health_check is set"
    action: "click"
    selector: "[data-testid='add-health-check']"
    wait_for: "[data-testid='health-check-selector']"
    description: "Open health check selector"
    then:
      - id: "select-health-check"
        action: "select"
        selector: "[data-testid='health-check-selector']"
        value: "{health_check}"
        description: "Select the named health check from the list"

  - id: "save"
    action: "click"
    selector: "[data-testid='save-and-exit']"
    wait_for: "[data-testid='resource-detail']"
    wait_timeout_ms: 30000
    description: "Save the origin pool and wait for the detail page"

  - id: "verify-created"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{name}"
    description: "Verify the resource was created by checking the name on the detail page"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 30
  notes: "Selectors are placeholders — must be validated against the live console"
