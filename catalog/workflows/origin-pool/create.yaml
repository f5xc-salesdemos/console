schema: "urn:f5xc:console:workflow:v1"
id: "origin-pool-create"
label: "Create Origin Pool"
resource: "origin-pool"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Origin pool name (lowercase alphanumeric and hyphens)"
    example: "example-origin-pool"
  origin_server:
    required: true
    description: "DNS hostname of the origin server (must be hostname format, not IP)"
    example: "app.example.com"
  port:
    required: true
    type: "number"
    description: "Port number for the origin server"
    example: 8080
  health_check:
    required: false
    description: "Existing health check name to attach"
    example: "example-health-check"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/origin_pools"
    wait_for: "text('Origin Pools')"
    description: "Navigate to Origin Pools list page within Web App & API Protection workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "tab:text('Add Origin Pool')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add Origin Pool tab to open the inline create form"
    note: "This is a tab element, not a button"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the origin pool name in the Name textbox"

  - id: "add-origin-server"
    action: "click"
    selector: "button:text('Add Item')"
    context: "Origin Servers section"
    wait_for: "textbox"
    description: "Click Add Item to add an origin server entry"
    then:
      - id: "fill-origin-server"
        action: "fill"
        selector: "textbox"
        context: "Origin server entry"
        value: "{origin_server}"
        description: "Enter the origin server address"

      - id: "apply-origin-server"
        action: "click"
        selector: "button:text('Apply')"
        description: "Confirm origin server entry"

  - id: "attach-health-check"
    condition: "params.health_check is set"
    action: "click"
    selector: "button:text('Add Item')"
    context: "Health Checks section"
    wait_for: "listbox"
    description: "Click Add Item in the Health Checks section to add a health check"
    then:
      - id: "select-health-check"
        action: "select"
        selector: "listbox"
        context: "Health Check selector"
        value: "{health_check}"
        description: "Select the named health check from the dropdown"

      - id: "apply-health-check"
        action: "click"
        selector: "button:text('Apply')"
        description: "Confirm health check selection"

  - id: "save"
    action: "click"
    selector: "button:text('Add Origin Pool')"
    context: "footer"
    wait_for: "text('{name}')"
    wait_timeout_ms: 30000
    description: "Click the Add Origin Pool button in the form footer to save"

  - id: "verify-created"
    action: "assert"
    selector: "text('{name}')"
    description: "Verify the resource was created by checking the name appears in the list"

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 30
  notes: "Selectors use aria/text-based patterns validated against live console. No data-testid attributes exist."
