schema: urn:xcsh:console:workflow:v1
id: cloud-elastic-ip-create
label: Create Cloud Elastic IPs
resource: cloud-elastic-ip
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Cloud Elastic IPs name (lowercase alphanumeric and hyphens)
    example: example-cloud-elastic-ip
  site_reference:
    required: true
    description: Site Reference
  count:
    required: true
    description: "Server-required: Must be >= 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/network_configuration/cloud_elastic_ip
    wait_for: text('Cloud Elastic IPs')
    description: Navigate to Cloud Elastic IPs list page
  - id: click-add-tab
    action: click
    selector: text('Add Cloud Elastic IP')
    wait_for: textbox[name='Name']
    description: Click Add Cloud Elastic IP to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-site_reference
    action: select
    selector: listbox
    context: Site Reference section
    value: "{site_reference}"
    description: Select Site Reference
  - id: configure-count
    action: click
    selector: text('Configure')
    context: Count section
    description: Open the Count configuration ('Configure' is a link, not a button)
  - id: fill-count-value
    action: fill
    selector: textbox
    value: "{count}"
    description: Enter the Count value via the 'count' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
