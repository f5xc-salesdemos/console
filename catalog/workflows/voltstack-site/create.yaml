schema: urn:f5xc:console:workflow:v1
id: voltstack-site-create
label: Create App Stack Sites
resource: voltstack-site
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: App Stack Sites name (lowercase alphanumeric and hyphens)
    example: example-voltstack-site
  volterra_certified_hw:
    required: true
    description: "Server-required: Minimum length of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/cloud_sites/appstack_site
    wait_for: text('App Stack Sites')
    description: Navigate to App Stack Sites list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add App Stack Site')
    wait_for: textbox[name='Name']
    description: Click the Add App Stack Site tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-volterra_certified_hw
    action: click
    selector: text('Configure')
    context: Volterra Certified Hw section
    description: Open the Volterra Certified Hw configuration ('Configure' is a link, not a button)
  - id: fill-volterra_certified_hw-value
    action: fill
    selector: textbox
    value: "{volterra_certified_hw}"
    description: Enter the Volterra Certified Hw value via the 'volterra_certified_hw' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
