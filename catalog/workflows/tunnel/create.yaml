schema: urn:f5xc:console:workflow:v1
id: tunnel-create
label: Create Tunnels
resource: tunnel
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Tunnels name (lowercase alphanumeric and hyphens)
    example: example-tunnel
  tunnel_type:
    required: true
    description: Tunnel Type
  local_ip:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/tunnels
    wait_for: text('Tunnels')
    description: Navigate to Tunnels list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Tunnel')
    wait_for: textbox[name='Name']
    description: Click the Add Tunnel tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-tunnel_type
    action: select
    selector: listbox
    context: Tunnel Type section
    value: "{tunnel_type}"
    description: Select Tunnel Type
  - id: configure-local_ip
    action: click
    selector: text('Configure')
    context: Local Ip section
    description: Open the Local Ip configuration ('Configure' is a link, not a button)
  - id: fill-local_ip-value
    action: fill
    selector: textbox
    value: "{local_ip}"
    description: Enter the Local Ip value via the 'local_ip' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
