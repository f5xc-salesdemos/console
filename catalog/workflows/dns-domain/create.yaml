schema: urn:xcsh:console:workflow:v1
id: dns-domain-create
label: Create Delegated Domain Management
resource: dns-domain
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Delegated Domain Management name (lowercase alphanumeric and hyphens)
    example: example-dns-domain
  domain_name:
    required: true
    description: Domain Name
  domain_method:
    required: false
    description: Domain Method
    default: Managed by Distributed Cloud
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_domain
    wait_for: text('Delegated Domain Management')
    description: Navigate to Delegated Domain Management list page
  - id: click-add-tab
    action: click
    selector: text('Add Domain')
    wait_for: textbox[name='Name']
    description: Click Add Domain to open the create form
  - id: fill-domain_name
    action: fill
    selector: textbox[name='Domain Name']
    value: "{domain_name}"
    description: Enter Domain Name
  - id: select-domain_method
    action: select
    selector: listbox
    context: Domain Method section
    value: "{domain_method}"
    description: Select Domain Method
    condition: params.domain_method is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
