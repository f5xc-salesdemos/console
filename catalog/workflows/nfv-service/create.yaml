schema: urn:f5xc:console:workflow:v1
id: nfv-service-create
label: Create NFV Services
resource: nfv-service
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: NFV Services name (lowercase alphanumeric and hyphens)
    example: example-nfv-service
  external_service_provider:
    required: false
    description: External Service Provider
    default: Virtual BIG-IP on AWS
  provider_configuration:
    required: true
    description: Provider Configuration
  https_based_management_of_nodes:
    required: false
    description: HTTPS Based Management of Nodes
    default: Disable HTTPS Based Management
  ssh_based_management_of_nodes:
    required: false
    description: SSH based management of nodes
    default: Disable SSH access
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/nfv_services
    wait_for: text('NFV Services')
    description: Navigate to NFV Services list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add NFV Service')
    wait_for: textbox[name='Name']
    description: Click the Add NFV Service tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-external_service_provider
    action: select
    selector: listbox
    context: External Service Provider section
    value: "{external_service_provider}"
    description: Select External Service Provider
    condition: params.external_service_provider is set
  - id: configure-provider_configuration
    action: click
    selector: button:text('Configure')
    context: Provider Configuration section
    description: Open the Provider Configuration configuration (required field). The sub-form must be filled for save to succeed.
  - id: select-https_based_management_of_nodes
    action: select
    selector: listbox
    context: HTTPS Based Management of Nodes section
    value: "{https_based_management_of_nodes}"
    description: Select HTTPS Based Management of Nodes
    condition: params.https_based_management_of_nodes is set
  - id: select-ssh_based_management_of_nodes
    action: select
    selector: listbox
    context: SSH based management of nodes section
    value: "{ssh_based_management_of_nodes}"
    description: Select SSH based management of nodes
    condition: params.ssh_based_management_of_nodes is set
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
