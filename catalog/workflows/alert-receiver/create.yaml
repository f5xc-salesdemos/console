schema: urn:f5xc:console:workflow:v1
id: alert-receiver-create
label: Create Alert Receivers
resource: alert-receiver
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Alert Receivers name (lowercase alphanumeric and hyphens)
    example: example-alert-receiver
  receiver_configuration:
    required: true
    description: Receiver Configuration
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/audit-logs-and-alerts/namespaces/system/manage/alert_receivers
    wait_for: text('Alert Receivers')
    description: Navigate to Alert Receivers list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Alert Receiver')
    wait_for: textbox[name='Name']
    description: Click the Add Alert Receiver tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-receiver_configuration
    action: click
    selector: button:text('Configure')
    context: Receiver Configuration section
    description: Open the Receiver Configuration configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
