schema: urn:xcsh:console:workflow:v1
id: workload-flavor-create
label: Create Workload Flavors
resource: workload-flavor
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Workload Flavors name (lowercase alphanumeric and hyphens)
    example: example-workload-flavor
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/manage/workload_flavors
    wait_for: text('Workload Flavors')
    description: Navigate to Workload Flavors list page
  - id: click-add-tab
    action: click
    selector: text('Add Workload Flavor')
    wait_for: textbox[name='Name']
    description: Click Add Workload Flavor to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
