schema: urn:xcsh:console:workflow:v1
id: secret-policy-create
label: Create Secret Policies
resource: secret-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Secret Policies name (lowercase alphanumeric and hyphens)
    example: example-secret-policy
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/secrets/secret_policies
    wait_for: text('Secret Policies')
    description: Navigate to Secret Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add Secret Policy')
    wait_for: textbox[name='Name']
    description: Click Add Secret Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
