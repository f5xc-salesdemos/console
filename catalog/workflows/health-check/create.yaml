schema: "urn:f5xc:console:workflow:v1"
id: "health-check-create"
label: "Create Health Check"
resource: "health-check"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Health check name (lowercase alphanumeric and hyphens)"
    example: "example-health-check"
  health_check_type:
    required: false
    description: "Health check protocol type"
    example: "HTTP HealthCheck"
    default: "HTTP HealthCheck"
  timeout:
    required: false
    type: "number"
    description: "Timeout for each health check probe in seconds"
    example: 3
    default: 3
  interval:
    required: false
    type: "number"
    description: "Interval between health check probes in seconds"
    example: 15
    default: 15
  unhealthy_threshold:
    required: false
    type: "number"
    description: "Number of consecutive failures before marking unhealthy"
    example: 1
    default: 1
  healthy_threshold:
    required: false
    type: "number"
    description: "Number of consecutive successes before marking healthy"
    example: 3
    default: 3

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks"
    wait_for: "text('Health Checks')"
    description: "Navigate to Health Checks list page within Web App & API Protection workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "tab:text('Add Health Check')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add Health Check tab to open the inline create form"
    note: "This is a tab element, not a button"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the health check name in the Name textbox"

  - id: "select-type"
    condition: "params.health_check_type is set"
    action: "select"
    selector: "listbox"
    context: "Health Check Parameters section"
    value: "{health_check_type}"
    description: "Select the health check type (HTTP HealthCheck or TCP HealthCheck)"

  - id: "set-timeout"
    condition: "params.timeout is set"
    action: "fill"
    selector: "spinbutton[name='Timeout']"
    value: "{timeout}"
    description: "Set the health check timeout value"

  - id: "set-interval"
    condition: "params.interval is set"
    action: "fill"
    selector: "spinbutton[name='Interval']"
    value: "{interval}"
    description: "Set the health check interval value"

  - id: "set-unhealthy-threshold"
    condition: "params.unhealthy_threshold is set"
    action: "fill"
    selector: "spinbutton[name='Unhealthy Threshold']"
    value: "{unhealthy_threshold}"
    description: "Set the unhealthy threshold value"

  - id: "set-healthy-threshold"
    condition: "params.healthy_threshold is set"
    action: "fill"
    selector: "spinbutton[name='Healthy Threshold']"
    value: "{healthy_threshold}"
    description: "Set the healthy threshold value"

  - id: "save"
    action: "click"
    selector: "[class*='save-bt']"
    wait_for: "text('{name}')"
    wait_timeout_ms: 30000
    description: "Click the Add Health Check button to save. The 'button' role disambiguates the footer save button from the same-named tab, so no section context is needed. The wait_for confirms the new resource's name appears in the list, which is the creation verification."

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-18"
  console_version: "2025.06"
  estimated_duration_seconds: 25
  notes: "Selectors use aria/text-based patterns validated against live console. No data-testid attributes exist. Has Show Advanced Fields toggle for additional parameters."
