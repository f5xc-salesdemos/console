schema: "urn:f5xc:console:workflow:v1"
id: "health-check-create"
label: "Create Health Check"
resource: "health-check"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Health check name (lowercase alphanumeric and hyphens)"
    example: "my-health-check"
  health_check_type:
    required: true
    description: "Health check protocol type"
    example: "HTTP"
  path:
    required: false
    description: "HTTP path to check (for HTTP health checks)"
    example: "/healthz"
  interval:
    required: false
    type: "number"
    description: "Interval between health check probes in seconds"
    example: 15
  timeout:
    required: false
    type: "number"
    description: "Timeout for each health check probe in seconds"
    example: 3
  unhealthy_threshold:
    required: false
    type: "number"
    description: "Number of consecutive failures before marking unhealthy"
    example: 3

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/load-balancers/health-checks"
    wait_for: "[data-testid='add-health-check']"
    description: "Navigate to Health Checks list page"

  - id: "click-add"
    action: "click"
    selector: "[data-testid='add-health-check']"
    wait_for: "input[data-testid='name-input']"
    description: "Click Add Health Check button to open the create form"

  - id: "fill-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: "{name}"
    description: "Enter the health check name"

  - id: "select-type"
    action: "select"
    selector: "[data-testid='health-check-type-select']"
    value: "{health_check_type}"
    description: "Select the health check protocol type (HTTP or TCP)"

  - id: "fill-path"
    condition: "params.path is set"
    action: "fill"
    selector: "[data-testid='path-input']"
    value: "{path}"
    description: "Enter the HTTP health check path"

  - id: "fill-interval"
    condition: "params.interval is set"
    action: "fill"
    selector: "[data-testid='interval-input']"
    value: "{interval}"
    description: "Set the health check interval"

  - id: "fill-timeout"
    condition: "params.timeout is set"
    action: "fill"
    selector: "[data-testid='timeout-input']"
    value: "{timeout}"
    description: "Set the health check timeout"

  - id: "fill-unhealthy-threshold"
    condition: "params.unhealthy_threshold is set"
    action: "fill"
    selector: "[data-testid='unhealthy-threshold-input']"
    value: "{unhealthy_threshold}"
    description: "Set the unhealthy threshold"

  - id: "save"
    action: "click"
    selector: "[data-testid='save-and-exit']"
    wait_for: "[data-testid='resource-detail']"
    wait_timeout_ms: 30000
    description: "Save the health check and wait for the detail page"

  - id: "verify-created"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{name}"
    description: "Verify the resource was created by checking the name on the detail page"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 25
  notes: "Selectors are placeholders — must be validated against the live console"
