schema: "urn:xcsh:console:workflow:v1"
id: "health-check-delete"
label: "Delete Health Check"
resource: "health-check"
operation: "delete"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"
  - "resource_exists: {name}"

params:
  namespace:
    required: true
    description: "Namespace containing the health check"
    example: "demo"
  name:
    required: true
    description: "Name of the health check to delete"
    example: "example-health-check"

# Selectors discovered against the live console 2026-06-22. The console has NO
# data-testid attributes; it uses ves-e2e-test. The per-row actions menu is a
# shared CrudComponent: a kebab button opens a listbox whose options include
# Delete, which opens a confirmation dialog with Cancel / Delete buttons.
steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks"
    wait_for: "text('Health Checks')"
    description: "Navigate to the Health Check list page (Web App & API Protection workspace)"

  - id: "scroll-actions-into-view"
    action: "scroll"
    selector: "row:has-text('{name}') >> [ves-e2e-test='row-action-dropdown']"
    context: "row containing {name}"
    description: "The data table is wider than the viewport and the Actions column sits off-screen-right; scroll the row's actions button into view before clicking. Avoids enlarging the window."
    note: "For a multi-row list, scope to the datatable-body-row whose cells contain {name}; for a single-row list the first row-action-dropdown is the target."

  - id: "open-row-actions"
    action: "click"
    selector: "row:has-text('{name}') >> [ves-e2e-test='row-action-dropdown']"
    context: "row containing {name}"
    wait_for: "option:text('Delete')"
    description: "Click the row kebab to open the actions listbox. Requires a trusted (CDP) click — synthetic JS clicks fire outside Angular's zone and never render the overlay."

  - id: "click-delete"
    action: "click"
    selector: "option:text('Delete')"
    wait_for: "button:text('Delete')"
    description: "Click the Delete option (ves-e2e-test='row-action-item-delete') to open the confirmation dialog."

  - id: "confirm-delete"
    action: "click"
    selector: "button:text('Delete')"
    context: "confirmation dialog"
    wait_for: "text('Health Checks')"
    wait_timeout_ms: 15000
    description: "Click the dialog's Delete button to confirm. Cancel via button:text('Cancel') aborts without deleting."

  - id: "verify-on-list"
    action: "assert"
    selector: "text('Health Checks')"
    description: "Confirm the list page is shown after deletion. (Run-time read-back verifies {name} is absent; assert checks presence, so it targets the list heading, not the removed row.)"

postconditions:
  - "resource_removed_from_list"
  - "list_page_visible"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-22"
  console_version: "2025.06"
  estimated_duration_seconds: 15
  selector_scheme: "ves-e2e-test + aria (no data-testid exists)"
  notes: "Validated end-to-end on the live nferreira staging tenant 2026-06-22 (UI delete confirmed; list row removed and API GET returned 404)."
