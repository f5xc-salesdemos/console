schema: "urn:xcsh:console:workflow:v1"
id: "app-firewall-create"
label: "Create App Firewall"
resource: "app-firewall"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "App firewall name (lowercase alphanumeric and hyphens)"
    example: "example-app-firewall"
  enforcement_mode:
    required: false
    description: "Enforcement mode: Monitoring or Blocking"
    example: "Blocking"
    default: "Monitoring"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/app_firewall"
    wait_for: "text('App Firewalls')"
    description: "Navigate to App Firewalls list page within Web App & API Protection workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "tab:text('Add App Firewall')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add App Firewall tab to open the inline create form"
    note: "This is a tab element, not a button"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the app firewall name in the Name textbox"

  - id: "select-enforcement-mode"
    condition: "params.enforcement_mode is set"
    action: "select"
    selector: "listbox"
    context: "Enforcement Mode section"
    value: "{enforcement_mode}"
    description: "Select the enforcement mode (Monitoring or Blocking)"

  - id: "save"
    action: "click"
    selector: "[class*='save-bt']"
    context: "footer"
    wait_for: "text('{name}')"
    wait_timeout_ms: 30000
    description: "Click the Add App Firewall button in the form footer to save"

  - id: "verify-created"
    action: "assert"
    selector: "text('{name}')"
    description: "Verify the resource was created by checking the name appears in the list"

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 25
  notes: "Selectors use aria/text-based patterns validated against live console. No data-testid attributes exist."
