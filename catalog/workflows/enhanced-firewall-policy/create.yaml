schema: urn:f5xc:console:workflow:v1
id: enhanced-firewall-policy-create
label: Create Enhanced Firewall Policies
resource: enhanced-firewall-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Enhanced Firewall Policies name (lowercase alphanumeric and hyphens)
    example: example-enhanced-firewall-policy
  select_enhanced_firewall_policy_rule_type:
    required: false
    description: Select Enhanced Firewall Policy Rule Type
    default: Allow all connections
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/enhanced_firewall_policy
    wait_for: text('Enhanced Firewall Policies')
    description: Navigate to Enhanced Firewall Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add Enhanced Firewall Policy')
    wait_for: textbox[name='Name']
    description: Click Add Enhanced Firewall Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_enhanced_firewall_policy_rule_type
    action: select
    selector: listbox
    context: Select Enhanced Firewall Policy Rule Type section
    value: "{select_enhanced_firewall_policy_rule_type}"
    description: Select Select Enhanced Firewall Policy Rule Type
    condition: params.select_enhanced_firewall_policy_rule_type is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
