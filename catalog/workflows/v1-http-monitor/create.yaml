schema: urn:xcsh:console:workflow:v1
id: v1-http-monitor-create
label: Create HTTP Monitors
resource: v1-http-monitor
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: HTTP Monitors name (lowercase alphanumeric and hyphens)
    example: example-v1-http-monitor
  url:
    required: true
    description: URL
    default: https://example.com
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/observability/namespaces/system/manage/monitors/http_monitors
  wait_for: text('HTTP Monitors')
  description: Navigate to HTTP Monitors list page
- id: click-add-tab
  action: click
  selector: text('Add HTTP Monitor')
  wait_for: textbox[name='Name']
  description: Click Add HTTP Monitor to open the create form
- id: fill-name
  action: fill
  selector: textbox[name='Name']
  value: '{name}'
  description: Enter Name
- id: fill-url
  action: fill
  selector: textbox[name='URL']
  value: '{url}'
  description: Enter URL
- id: save
  action: click
  selector: '[class*=''save-bt''],[class*=''submit-button'']'
  context: footer
  wait_for: text('{name}')
  wait_timeout_ms: 30000
  description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
