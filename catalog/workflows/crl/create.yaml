schema: urn:f5xc:console:workflow:v1
id: crl-create
label: Create Certificate Revocation List
resource: crl
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Certificate Revocation List name (lowercase alphanumeric and hyphens)
    example: example-crl
  crl_server_address:
    required: true
    description: CRL Server address
  refresh_interval:
    required: true
    description: "Server-required: Must be >= 6"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/crl
    wait_for: text('Certificate Revocation List')
    description: Navigate to Certificate Revocation List list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add CRL')
    wait_for: textbox[name='Name']
    description: Click the Add CRL tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-crl_server_address
    action: fill
    selector: textbox[name='CRL Server address']
    value: "{crl_server_address}"
    description: Enter CRL Server address
  - id: configure-refresh_interval
    action: click
    selector: text('Configure')
    context: Refresh Interval section
    description: Open the Refresh Interval configuration ('Configure' is a link, not a button)
  - id: fill-refresh_interval-value
    action: fill
    selector: textbox
    value: "{refresh_interval}"
    description: Enter the Refresh Interval value via the 'refresh_interval' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
