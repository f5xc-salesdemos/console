schema: urn:xcsh:console:workflow:v1
id: authorization-server-create
label: Create Authorization Server
resource: authorization-server
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Authorization Server name (lowercase alphanumeric and hyphens)
    example: example-authorization-server
  jwks_uri:
    required: true
    description: "Feedback loop: 'Field JWKS URI in Spec must be a valid absolute URI'"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/authorization_server
    wait_for: text('Authorization Server')
    description: Navigate to Authorization Server list page
  - id: click-add-tab
    action: click
    selector: text('Add Authorization Server')
    wait_for: textbox[name='Name']
    description: Click Add Authorization Server to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-jwks_uri
    action: fill
    selector: textbox[name='JWKS URI']
    value: "{jwks_uri}"
    description: Enter JWKS URI
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
