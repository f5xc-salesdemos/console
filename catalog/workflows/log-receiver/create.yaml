schema: urn:f5xc:console:workflow:v1
id: log-receiver-create
label: Create Log Receivers
resource: log-receiver
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Log Receivers name (lowercase alphanumeric and hyphens)
    example: example-log-receiver
  log_receiver:
    required: false
    description: Log Receiver
    default: Syslog Server
  syslog_transport_mode:
    required: false
    description: Syslog Transport Mode
    default: Mode UDP
  server_name:
    required: true
    description: Server name
  port_number:
    required: false
    description: Port Number
    default: 514
  log_receiver_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/log_management/log_receivers
    wait_for: text('Log Receivers')
    description: Navigate to Log Receivers list page
  - id: click-add-tab
    action: click
    selector: text('Add Log Receiver')
    wait_for: textbox[name='Name']
    description: Click Add Log Receiver to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-log_receiver
    action: select
    selector: listbox
    context: Log Receiver section
    value: "{log_receiver}"
    description: Select Log Receiver
    condition: params.log_receiver is set
  - id: select-syslog_transport_mode
    action: select
    selector: listbox
    context: Syslog Transport Mode section
    value: "{syslog_transport_mode}"
    description: Select Syslog Transport Mode
    condition: params.syslog_transport_mode is set
  - id: fill-server_name
    action: fill
    selector: textbox[name='Server name']
    value: "{server_name}"
    description: Enter Server name
  - id: fill-port_number
    action: fill
    selector: spinbutton[name='Port Number']
    value: "{port_number}"
    description: "Set Port Number (default: 514)"
    condition: params.port_number is set
  - id: configure-log_receiver_choice
    action: click
    selector: text('Configure')
    context: Log Receiver Choice section
    description: Open the Log Receiver Choice configuration ('Configure' is a link, not a button)
  - id: fill-log_receiver_choice-value
    action: fill
    selector: textbox
    value: "{log_receiver_choice}"
    description: Enter the Log Receiver Choice value via the 'log_receiver_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
