schema: urn:f5xc:console:workflow:v1
id: bgp-asn-set-create
label: Create BGP ASN Sets
resource: bgp-asn-set
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: BGP ASN Sets name (lowercase alphanumeric and hyphens)
    example: example-bgp-asn-set
  as_numbers:
    required: false
    description: List of AS Numbers — a row pre-exists with value 0; fill it with a valid ASN (e.g. 64512). Uses
      ngx-datatable input.
    default: null
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/bgp_asn_sets
    wait_for: text('BGP ASN Sets')
    description: Navigate to BGP ASN Sets list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add BGP ASN Set')
    wait_for: textbox[name='Name']
    description: Click the Add BGP ASN Set tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-as_numbers
    action: fill
    selector: ngx-datatable input.form-control
    context: AS Numbers table
    value: "{as_numbers}"
    description: Enter AS Numbers in the existing table row (no Add Item needed — the table ships one empty row)
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
