schema: urn:f5xc:console:workflow:v1
id: network-interface-create
label: Create Network Interfaces
resource: network-interface
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Interfaces name (lowercase alphanumeric and hyphens)
    example: example-network-interface
  interface_config_type:
    required: false
    description: Interface Config Type
    default: Ethernet Interface
  ethernet_interface:
    required: true
    description: Ethernet Interface
  interface_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/network_interfaces
    wait_for: text('Network Interfaces')
    description: Navigate to Network Interfaces list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Network Interface')
    wait_for: textbox[name='Name']
    description: Click the Add Network Interface tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-interface_config_type
    action: select
    selector: listbox
    context: Interface Config Type section
    value: "{interface_config_type}"
    description: Select Interface Config Type
    condition: params.interface_config_type is set
  - id: configure-ethernet_interface
    action: click
    selector: text('Configure')
    context: Ethernet Interface section
    description: Open the Ethernet Interface configuration ('Configure' is a link, not a button)
  - id: fill-ethernet_interface-value
    action: fill
    selector: textbox
    value: "{ethernet_interface}"
    description: Enter the Ethernet Interface value via the 'ethernet_interface' parameter
  - id: configure-interface_choice
    action: click
    selector: text('Configure')
    context: Interface Choice section
    description: Open the Interface Choice configuration ('Configure' is a link, not a button)
  - id: fill-interface_choice-value
    action: fill
    selector: textbox
    value: "{interface_choice}"
    description: Enter the Interface Choice value via the 'interface_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
