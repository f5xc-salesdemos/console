schema: urn:xcsh:console:workflow:v1
id: api-credential-create
label: Create Credentials
resource: api-credential
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: false
    description: Credentials name (lowercase alphanumeric and hyphens)
    example: example-api-credential
  credential_name:
    required: true
    description: Credential Name (DNS-1035)
    default: xcsh-test-api-cred
  credential_type:
    required: false
    description: Credential Type
    default: API Certificate
  password:
    required: true
    description: Password
  confirm_password:
    required: true
    description: Confirm Password
  expiry_date:
    required: true
    description: Expiry Date in MM/DD/YYYY (API Certificate max ~90 days from now)
    default: today+30d
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/administration/personal-management/api_credentials
  wait_for: text('Credentials')
  description: Navigate to Credentials list page
- id: click-add-tab
  action: click
  selector: text('Add Credentials')
  wait_for: textbox[name='Credential Name']
  description: Click Add Credentials to open the create form
- id: fill-credential_name
  action: fill
  selector: textbox[name='Credential Name']
  value: '{credential_name}'
  description: Enter Credential Name
- id: select-credential_type
  action: select
  selector: listbox
  context: Credential Type section
  value: '{credential_type}'
  description: Select Credential Type
  condition: params.credential_type is set
- id: fill-password
  action: fill
  selector: textbox[name='Password']
  value: '{password}'
  description: Enter Password
- id: fill-confirm_password
  action: fill
  selector: textbox[name='Confirm Password']
  value: '{confirm_password}'
  description: Enter Confirm Password
- id: fill-expiry_date
  action: fill
  selector: textbox[name='Expiry Date']
  value: '{expiry_date}'
  description: Enter Expiry Date
- id: save
  action: click
  selector: text('Download')
  wait_for: text('Add Credentials')
  wait_timeout_ms: 20000
  description: Click Download to generate the API credential. The panel closes and returns to the Credentials list (Add Credentials
    tab visible) = success.
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
