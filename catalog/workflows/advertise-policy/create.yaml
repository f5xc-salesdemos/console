schema: urn:f5xc:console:workflow:v1
id: advertise-policy-create
label: Create Advertise Policies
resource: advertise-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Advertise Policies name (lowercase alphanumeric and hyphens)
    example: example-advertise-policy
  virtual_site_or_site_or_network:
    required: false
    description: Virtual-Site or Site or Network
    default: Virtual Site
  reference:
    required: true
    description: Reference
  internet_vip_choice:
    required: false
    description: Internet VIP Choice
    default: Disable advertise on internet vip
  tcp_udp_port:
    required: false
    description: TCP/UDP Port
    default: TCP/UDP Port
  tcp_udp_port_value:
    required: false
    description: TCP/UDP Port (value)
    default: 80
  port_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/advertise_policies
    wait_for: text('Advertise Policies')
    description: Navigate to Advertise Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Advertise Policy')
    wait_for: textbox[name='Name']
    description: Click the Add Advertise Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-virtual_site_or_site_or_network
    action: select
    selector: listbox
    context: Virtual-Site or Site or Network section
    value: "{virtual_site_or_site_or_network}"
    description: Select Virtual-Site or Site or Network
    condition: params.virtual_site_or_site_or_network is set
  - id: select-reference
    action: select
    selector: listbox
    context: Reference section
    value: "{reference}"
    description: Select Reference
  - id: select-internet_vip_choice
    action: select
    selector: listbox
    context: Internet VIP Choice section
    value: "{internet_vip_choice}"
    description: Select Internet VIP Choice
    condition: params.internet_vip_choice is set
  - id: select-tcp_udp_port
    action: select
    selector: listbox
    context: TCP/UDP Port section
    value: "{tcp_udp_port}"
    description: Select TCP/UDP Port
    condition: params.tcp_udp_port is set
  - id: fill-tcp_udp_port_value
    action: fill
    selector: spinbutton[name='TCP/UDP Port (value)']
    value: "{tcp_udp_port_value}"
    description: "Set TCP/UDP Port (value) (default: 80)"
    condition: params.tcp_udp_port_value is set
  - id: configure-port_choice
    action: click
    selector: text('Configure')
    context: Port Choice section
    description: Open the Port Choice configuration ('Configure' is a link, not a button)
  - id: fill-port_choice-value
    action: fill
    selector: textbox
    value: "{port_choice}"
    description: Enter the Port Choice value via the 'port_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
