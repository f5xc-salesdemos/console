schema: urn:f5xc:console:workflow:v1
id: waf-exclusion-policy-create
label: Create WAF Exclusion Rules
resource: waf-exclusion-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: WAF Exclusion Rules name (lowercase alphanumeric and hyphens)
    example: example-waf-exclusion-policy
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/waf_exclusion_policy
    wait_for: text('WAF Exclusion Rules')
    description: Navigate to WAF Exclusion Rules list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add WAF Exclusion Rule')
    wait_for: textbox[name='Name']
    description: Click the Add WAF Exclusion Rule tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
