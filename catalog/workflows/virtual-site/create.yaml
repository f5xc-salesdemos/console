schema: urn:xcsh:console:workflow:v1
id: virtual-site-create
label: Create Virtual Sites
resource: virtual-site
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Virtual Sites name (lowercase alphanumeric and hyphens)
    example: example-virtual-site
  site_selector_expression:
    required: false
    description: 'CDK-portal label-selector: Add Label → type key prefix (e.g. "ves") → select from portal → operator →
      value. Verified live via label_select tool.'
    default: ves.io/siteName=any
  site_type:
    required: false
    description: "Required: Site Type (RE = Regional Edge, CE = Customer Edge). Select from the listbox."
    default: RE
    example: RE
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/manage/virtual_sites
    wait_for: text('Virtual Sites')
    description: Navigate to Virtual Sites list page
  - id: click-add-tab
    action: click
    selector: text('Add Virtual Site')
    wait_for: textbox[name='Name']
    description: Click Add Virtual Site to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-label-site_selector_expression
    action: click
    selector: text('Add Label')
    context: Site Selector Expression section
    description: Open the label-selector typeahead for Site Selector Expression
  - id: select-label-key-site_selector_expression
    action: selectLabel
    selector: input[placeholder='Type to search']
    value: "{site_selector_expression}"
    description: Select label key for Site Selector Expression from the CDK portal (type prefix → pick option)
  - id: select-site_type
    action: select
    selector: listbox
    context: Site Type section
    value: "{site_type}"
    description: Select Site Type (RE | CE)
    condition: params.site_type is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
