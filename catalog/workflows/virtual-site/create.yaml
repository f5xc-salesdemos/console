schema: urn:f5xc:console:workflow:v1
id: virtual-site-create
label: Create Virtual Sites
resource: virtual-site
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Virtual Sites name (lowercase alphanumeric and hyphens)
    example: example-virtual-site
  site_selector:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/manage/virtual_sites
    wait_for: text('Virtual Sites')
    description: Navigate to Virtual Sites list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Virtual Site')
    wait_for: textbox[name='Name']
    description: Click the Add Virtual Site tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-site_selector
    action: click
    selector: button:text('Configure')
    context: Site Selector section
    description: Open the Site Selector configuration (required)
  - id: fill-site_selector-value
    action: fill
    selector: textbox
    value: "{site_selector}"
    description: Fill the required field inside the Site Selector configuration. The agent provides this via the
      'site_selector' parameter.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
