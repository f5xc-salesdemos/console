schema: urn:xcsh:console:workflow:v1
id: data-type-create
label: Create Data Types
resource: data-type
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Data Types name (lowercase alphanumeric and hyphens)
    example: example-data-type
  data_type_rules:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/data_type
    wait_for: text('Data Types')
    description: Navigate to Data Types list page
  - id: click-add-tab
    action: click
    selector: text('Add Data Type')
    wait_for: textbox[name='Name']
    description: Click Add Data Type to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-data_type_rules
    action: click
    selector: text('Configure')
    context: Data Type Rules section
    description: Open the Data Type Rules configuration ('Configure' is a link, not a button)
  - id: fill-data_type_rules-value
    action: fill
    selector: textbox
    value: "{data_type_rules}"
    description: Enter the Data Type Rules value via the 'data_type_rules' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
