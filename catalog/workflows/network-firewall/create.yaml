schema: urn:f5xc:console:workflow:v1
id: network-firewall-create
label: Create Network Firewalls
resource: network-firewall
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Firewalls name (lowercase alphanumeric and hyphens)
    example: example-network-firewall
  select_forward_policy_configuration:
    required: false
    description: Select Forward Policy Configuration
    default: Disable Forward Proxy Policy
  select_firewall_policy_configuration:
    required: false
    description: Select Firewall Policy Configuration
    default: Disable Firewall Policy
  select_fast_acl_configuration:
    required: false
    description: Select Fast ACL Configuration
    default: Disable Fast ACL
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/network_firewall
    wait_for: text('Network Firewalls')
    description: Navigate to Network Firewalls list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Network Firewall')
    wait_for: textbox[name='Name']
    description: Click the Add Network Firewall tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_forward_policy_configuration
    action: select
    selector: listbox
    context: Select Forward Policy Configuration section
    value: "{select_forward_policy_configuration}"
    description: Select Select Forward Policy Configuration
    condition: params.select_forward_policy_configuration is set
  - id: select-select_firewall_policy_configuration
    action: select
    selector: listbox
    context: Select Firewall Policy Configuration section
    value: "{select_firewall_policy_configuration}"
    description: Select Select Firewall Policy Configuration
    condition: params.select_firewall_policy_configuration is set
  - id: select-select_fast_acl_configuration
    action: select
    selector: listbox
    context: Select Fast ACL Configuration section
    value: "{select_fast_acl_configuration}"
    description: Select Select Fast ACL Configuration
    condition: params.select_fast_acl_configuration is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
