schema: urn:xcsh:console:workflow:v1
id: virtual-network-create
label: Create Virtual Networks
resource: virtual-network
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Virtual Networks name (lowercase alphanumeric and hyphens)
    example: example-virtual-network
  select_type_of_network:
    required: false
    description: Select Type of Network
    default: Global Network
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/virtual_networks
    wait_for: text('Virtual Networks')
    description: Navigate to Virtual Networks list page
  - id: click-add-tab
    action: click
    selector: text('Add Virtual Network')
    wait_for: textbox[name='Name']
    description: Click Add Virtual Network to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_type_of_network
    action: select
    selector: listbox
    context: Select Type of Network section
    value: "{select_type_of_network}"
    description: Select Select Type of Network
    condition: params.select_type_of_network is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
