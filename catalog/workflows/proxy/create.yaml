schema: urn:xcsh:console:workflow:v1
id: proxy-create
label: Create HTTP Connect & DRPs
resource: proxy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: HTTP Connect & DRPs name (lowercase alphanumeric and hyphens)
    example: example-proxy
  http_connect_proxy_or_dynamic_reverse_proxy:
    required: false
    description: HTTP Connect Proxy or Dynamic Reverse Proxy
    default: HTTP Connect Proxy
  http_connect:
    required: false
    description: HTTP Connect
    default: HTTP Connect
  select_sites_for_proxy:
    required: false
    description: Select Sites for Proxy
    default: Site or Virtual Site
  site_or_virtual_site:
    required: true
    description: Site or Virtual Site
  select_upstream_network:
    required: false
    description: Select Upstream Network
    default: Site Local Network (Outside)
  tls_interception_choice:
    required: false
    description: TLS Interception choice
    default: No TLS Interception
  manage_proxy_policy:
    required: false
    description: Manage Proxy Policy
    default: Disable Proxy Policy
  proxy_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/proxy
    wait_for: text('HTTP Connect & DRPs')
    description: Navigate to HTTP Connect & DRPs list page
  - id: click-add-tab
    action: click
    selector: text('Add HTTP Connect / DRP')
    wait_for: textbox[name='Name']
    description: Click Add HTTP Connect / DRP to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-http_connect_proxy_or_dynamic_reverse_proxy
    action: select
    selector: listbox
    context: HTTP Connect Proxy or Dynamic Reverse Proxy section
    value: "{http_connect_proxy_or_dynamic_reverse_proxy}"
    description: Select HTTP Connect Proxy or Dynamic Reverse Proxy
    condition: params.http_connect_proxy_or_dynamic_reverse_proxy is set
  - id: select-http_connect
    action: select
    selector: listbox
    context: HTTP Connect section
    value: "{http_connect}"
    description: Select HTTP Connect
    condition: params.http_connect is set
  - id: select-select_sites_for_proxy
    action: select
    selector: listbox
    context: Select Sites for Proxy section
    value: "{select_sites_for_proxy}"
    description: Select Select Sites for Proxy
    condition: params.select_sites_for_proxy is set
  - id: configure-site_or_virtual_site
    action: click
    selector: text('Configure')
    context: Site or Virtual Site section
    description: Open the Site or Virtual Site configuration ('Configure' is a link, not a button)
  - id: fill-site_or_virtual_site-value
    action: fill
    selector: textbox
    value: "{site_or_virtual_site}"
    description: Enter the Site or Virtual Site value via the 'site_or_virtual_site' parameter
  - id: select-select_upstream_network
    action: select
    selector: listbox
    context: Select Upstream Network section
    value: "{select_upstream_network}"
    description: Select Select Upstream Network
    condition: params.select_upstream_network is set
  - id: select-tls_interception_choice
    action: select
    selector: listbox
    context: TLS Interception choice section
    value: "{tls_interception_choice}"
    description: Select TLS Interception choice
    condition: params.tls_interception_choice is set
  - id: select-manage_proxy_policy
    action: select
    selector: listbox
    context: Manage Proxy Policy section
    value: "{manage_proxy_policy}"
    description: Select Manage Proxy Policy
    condition: params.manage_proxy_policy is set
  - id: configure-proxy_choice
    action: click
    selector: text('Configure')
    context: Proxy Choice section
    description: Open the Proxy Choice configuration ('Configure' is a link, not a button)
  - id: fill-proxy_choice-value
    action: fill
    selector: textbox
    value: "{proxy_choice}"
    description: Enter the Proxy Choice value via the 'proxy_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
