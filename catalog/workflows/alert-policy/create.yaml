schema: urn:xcsh:console:workflow:v1
id: alert-policy-create
label: Create Alert Policies
resource: alert-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Alert Policies name (lowercase alphanumeric and hyphens)
    example: example-alert-policy
  alert_receivers:
    required: false
    description: "Server-required: at least one Alert Receiver reference. Depends on an existing alert_receiver object
      (create one first)."
    default: value
  policy_rules:
    required: false
    description: "Server-required: at least one alert policy rule (Field Policy Rules in Spec is required)."
    default: value
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/alert_config/alert_policies
    wait_for: text('Alert Policies')
    description: Navigate to Alert Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add Alert Policy')
    wait_for: textbox[name='Name']
    description: Click Add Alert Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: attach-alert_receivers
    action: click
    selector: button:text('Add Item')
    context: Alert Receivers section
    condition: params.alert_receivers is set
    description: Attach Alert Receivers (references a alert_receiver)
    then:
      - id: select-alert_receivers
        action: select
        selector: listbox
        context: Alert Receivers selector
        value: "{alert_receivers}"
        description: Select the Alert Receivers
      - id: apply-alert_receivers
        action: click
        selector: button:text('Apply')
        description: Confirm Alert Receivers selection
  - id: add-policy_rules
    action: click
    selector: button:text('Add Item')
    context: Policy Rules section
    description: Add Policy Rules entry
    then:
      - id: fill-policy_rules-value
        action: fill
        selector: textbox
        value: "{policy_rules}"
        description: Fill the first required field in the Policy Rules sub-form (the agent should provide a value via the
          'policy_rules' parameter)
      - id: apply-policy_rules
        action: click
        selector: button:text('Apply')
        description: Confirm Policy Rules entry
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
