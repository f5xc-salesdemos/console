schema: urn:xcsh:console:workflow:v1
id: protocol-policer-create
label: Create Protocol Policers
resource: protocol-policer
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Protocol Policers name (lowercase alphanumeric and hyphens)
    example: example-protocol-policer
  protocol_policer:
    required: true
    description: 'At least one protocol policer entry required. The nested Add Item sub-form requires selecting an existing
      Policer (feedback loop: "Field Policer is required") — a policer object must exist first.'
  policer:
    required: true
    description: Name of an existing policer to reference (dependency — create it first)
    example: example-policer
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/protocol_policers
    wait_for: text('Protocol Policers')
    description: Navigate to Protocol Policers list page
  - id: click-add-tab
    action: click
    selector: text('Add Protocol Policer')
    wait_for: textbox[name='Name']
    description: Click Add Protocol Policer to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-protocol_policer
    action: click
    selector: button:text('Add Item')
    context: Protocol Policer section
    description: Add Protocol Policer entry
    then:
      - id: select-protocol_policer-ref
        action: select
        selector: listbox[name='Policer']
        context: Policer selector
        value: "{policer}"
        description: Select the Policer for the Protocol Policer entry (references an existing policer — create one first)
      - id: apply-protocol_policer
        action: click
        selector: button:text('Apply')
        description: Confirm Protocol Policer entry
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
