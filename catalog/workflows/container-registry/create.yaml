schema: urn:f5xc:console:workflow:v1
id: container-registry-create
label: Create Container Registries
resource: container-registry
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Container Registries name (lowercase alphanumeric and hyphens)
    example: example-container-registry
  server_fqdn:
    required: true
    description: Server FQDN
  user_name:
    required: true
    description: User Name
  password:
    required: true
    description: Password
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/applications/container_registries
    wait_for: text('Container Registries')
    description: Navigate to Container Registries list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Container Registry')
    wait_for: textbox[name='Name']
    description: Click the Add Container Registry tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-server_fqdn
    action: fill
    selector: textbox[name='Server FQDN']
    value: "{server_fqdn}"
    description: Enter Server FQDN
  - id: fill-user_name
    action: fill
    selector: textbox[name='User Name']
    value: "{user_name}"
    description: Enter User Name
  - id: configure-password
    action: click
    selector: button:text('Configure')
    context: Password section
    description: Open the Password configuration (required)
  - id: fill-password-value
    action: fill
    selector: textbox
    value: "{password}"
    description: Fill the required field inside the Password configuration. The agent provides this via the 'password' parameter.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
