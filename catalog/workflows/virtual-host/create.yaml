schema: "urn:xcsh:console:workflow:v1"
id: "virtual-host-create"
label: "Create Virtual Host"
resource: "virtual-host"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Virtual host name (lowercase alphanumeric and hyphens)"
    example: "example-virtual-host"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/virtual_hosts"
    wait_for: "text('Virtual Hosts')"
    description: "Navigate to Virtual Hosts list page within Multi-Cloud App Connect workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "text('Add Virtual Host')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add Virtual Host tab to open the inline create form"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the virtual host name in the Name textbox"

  - id: "save"
    action: "click"
    selector: "button:text('Add Virtual Host')"
    context: "footer"
    wait_for: "text('{name}')"
    wait_timeout_ms: 60000
    description: "Click the Add Virtual Host button in the form footer to save"

  - id: "verify-created"
    action: "assert"
    selector: "text('{name}')"
    description: "Verify the resource was created by checking the name appears in the list"

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 20
  notes: "Selectors use aria/text-based patterns validated against live console. No data-testid attributes exist."
