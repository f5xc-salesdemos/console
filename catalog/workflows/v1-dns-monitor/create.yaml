schema: urn:xcsh:console:workflow:v1
id: v1-dns-monitor-create
label: Create DNS Monitors
resource: v1-dns-monitor
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: DNS Monitors name (lowercase alphanumeric and hyphens)
    example: example-v1-dns-monitor
  domain:
    required: true
    description: Domain
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/observability/namespaces/system/manage/dns_monitors
    wait_for: text('DNS Monitors')
    description: Navigate to DNS Monitors list page
  - id: click-add-tab
    action: click
    selector: text('Add DNS Monitor')
    wait_for: textbox[name='Name']
    description: Click Add DNS Monitor to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-domain
    action: fill
    selector: textbox[name='Domain']
    value: "{domain}"
    description: Enter Domain
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
