schema: urn:xcsh:console:workflow:v1
id: code-base-integration-create
label: Create Code Base Integration
resource: code-base-integration
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Code Base Integration name (lowercase alphanumeric and hyphens)
    example: example-code-base-integration
  code_base:
    required: true
    description: A vsui "Select item" listbox (not a configurable). Selects an existing code-base integration. Verified from
      live form screenshot.
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/code_base_integration
    wait_for: text('Code Base Integration')
    description: Navigate to Code Base Integration list page
  - id: click-add-tab
    action: click
    selector: text('Add Code Base Integration')
    wait_for: textbox[name='Name']
    description: Click Add Code Base Integration to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-code_base
    action: select
    selector: listbox[name='Code Base']
    context: Code Base section
    value: "{code_base}"
    description: Select Code Base (references an existing code_base — dependency)
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
