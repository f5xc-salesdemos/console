schema: urn:f5xc:console:workflow:v1
id: global-log-receiver-create
label: Create Global Log Receivers
resource: global-log-receiver
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Global Log Receivers name (lowercase alphanumeric and hyphens)
    example: example-global-log-receiver
  receiver_configuration:
    required: true
    description: Receiver Configuration
  log_type:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/log_management/log_receivers
    wait_for: text('Global Log Receivers')
    description: Navigate to Global Log Receivers list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Global Log Receiver')
    wait_for: textbox[name='Name']
    description: Click the Add Global Log Receiver tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-receiver_configuration
    action: click
    selector: text('Configure')
    context: Receiver Configuration section
    description: Open the Receiver Configuration configuration ('Configure' is a link, not a button)
  - id: fill-receiver_configuration-value
    action: fill
    selector: textbox
    value: "{receiver_configuration}"
    description: Enter the Receiver Configuration value via the 'receiver_configuration' parameter
  - id: configure-log_type
    action: click
    selector: text('Configure')
    context: Log Type section
    description: Open the Log Type configuration ('Configure' is a link, not a button)
  - id: fill-log_type-value
    action: fill
    selector: textbox
    value: "{log_type}"
    description: Enter the Log Type value via the 'log_type' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
