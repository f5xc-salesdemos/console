schema: urn:f5xc:console:workflow:v1
id: usb-policy-create
label: Create USB Policies
resource: usb-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: USB Policies name (lowercase alphanumeric and hyphens)
    example: example-usb-policy
  allowed_usb_devices:
    required: true
    description: Allowed USB devices
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/other_configs/usb_policies
    wait_for: text('USB Policies')
    description: Navigate to USB Policies list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add USB Policy')
    wait_for: textbox[name='Name']
    description: Click the Add USB Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-allowed_usb_devices
    action: click
    selector: button:text('Configure')
    context: Allowed USB devices section
    description: Open the Allowed USB devices configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
