schema: urn:f5xc:console:workflow:v1
id: aws-tgw-site-create
label: Create AWS TGW Sites
resource: aws-tgw-site
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: AWS TGW Sites name (lowercase alphanumeric and hyphens)
    example: example-aws-tgw-site
  aws_parameters:
    required: true
    description: AWS Parameters
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/legacy_configs/aws_tgw_site
    wait_for: text('AWS TGW Sites')
    description: Navigate to AWS TGW Sites list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add AWS TGW Site')
    wait_for: textbox[name='Name']
    description: Click the Add AWS TGW Site tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-aws_parameters
    action: click
    selector: button:text('Configure')
    context: AWS Parameters section
    description: Open the AWS Parameters configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
