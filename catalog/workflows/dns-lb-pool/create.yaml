schema: urn:f5xc:console:workflow:v1
id: dns-lb-pool-create
label: Create DNS Load Balancer Pools
resource: dns-lb-pool
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: DNS Load Balancer Pools name (lowercase alphanumeric and hyphens)
    example: example-dns-lb-pool
  pool_members:
    required: true
    description: "Server-required: Pool Members in A record type. Click Configure (link) to add members."
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/dns_lb_pool
    wait_for: text('DNS Load Balancer Pools')
    description: Navigate to DNS Load Balancer Pools list page
  - id: click-add-tab
    action: click
    selector: text('Add DNS Load Balancer Pool')
    wait_for: textbox[name='Name']
    description: Click Add DNS Load Balancer Pool to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-pool_members
    action: click
    selector: text('Configure')
    context: Pool Members section
    description: Open the Pool Members configuration ('Configure' is a link, not a button)
  - id: fill-pool_members-value
    action: fill
    selector: textbox
    value: "{pool_members}"
    description: Enter the Pool Members value via the 'pool_members' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
