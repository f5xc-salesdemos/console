schema: urn:f5xc:console:workflow:v1
id: dns-load-balancer-create
label: Create DNS Load Balancers
resource: dns-load-balancer
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: DNS Load Balancers name (lowercase alphanumeric and hyphens)
    example: example-dns-load-balancer
  record_type:
    required: true
    description: Record Type
  load_balancing_rules:
    required: true
    description: "Server-required: at least one Load Balancing Rule."
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/dns_load_balancer
    wait_for: text('DNS Load Balancers')
    description: Navigate to DNS Load Balancers list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add DNS Load Balancer')
    wait_for: textbox[name='Name']
    description: Click the Add DNS Load Balancer tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-record_type
    action: select
    selector: listbox
    context: Record Type section
    value: "{record_type}"
    description: Select Record Type
  - id: add-load_balancing_rules
    action: click
    selector: button:text('Add Item')
    context: Load Balancing Rules section
    description: Add Load Balancing Rules entry
    then:
      - id: fill-load_balancing_rules-value
        action: fill
        selector: textbox
        value: "{load_balancing_rules}"
        description: Fill the first required field in the Load Balancing Rules sub-form (the agent should provide a value via
          the 'load_balancing_rules' parameter)
      - id: apply-load_balancing_rules
        action: click
        selector: button:text('Apply')
        description: Confirm Load Balancing Rules entry
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
