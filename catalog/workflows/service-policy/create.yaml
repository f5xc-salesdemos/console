schema: "urn:xcsh:console:workflow:v1"
id: "service-policy-create"
label: "Create Service Policy"
resource: "service-policy"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Service policy name (lowercase alphanumeric and hyphens)"
    example: "example-service-policy"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/service_policies/service_policies"
    wait_for: "text('Service Policies')"
    description: "Navigate to Service Policies list page within Web App & API Protection workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "text('Add Service Policy')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add Service policy tab to open the inline create form"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the service policy name in the Name textbox"

  - id: "save"
    action: "click"
    selector: "[class*='save-bt']"
    context: "footer"
    wait_for: "text('{name}')"
    wait_timeout_ms: 60000
    description: "Click the Add Service policy button in the form footer to save"

  - id: "verify-created"
    action: "assert"
    selector: "text('{name}')"
    description: "Verify the resource was created by checking the name appears in the list"

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 20
  notes: "Selectors use aria/text-based patterns validated against live console. No data-testid attributes exist."
