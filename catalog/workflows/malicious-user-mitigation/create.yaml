schema: urn:xcsh:console:workflow:v1
id: malicious-user-mitigation-create
label: Create Malicious User Mitigation
resource: malicious-user-mitigation
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Malicious User Mitigation name (lowercase alphanumeric and hyphens)
    example: example-malicious-user-mitigation
  rules:
    required: true
    description: "At least one mitigation rule is required. Server error: 'Field Rules in Mitigation Rules is required.'"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/malicious_user_mitigation
    wait_for: text('Malicious User Mitigation')
    description: Navigate to Malicious User Mitigation list page
  - id: click-add-tab
    action: click
    selector: text('Add Malicious User Mitigation')
    wait_for: textbox[name='Name']
    description: Click Add Malicious User Mitigation to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-rules
    action: click
    selector: button:text('Add Item')
    context: Rules section
    description: Add Rules entry
    then:
      - id: fill-rules-value
        action: fill
        selector: textbox
        value: "{rules}"
        description: Fill the first required field in the Rules sub-form (the agent should provide a value via the 'rules'
          parameter)
      - id: apply-rules
        action: click
        selector: button:text('Apply')
        description: Confirm Rules entry
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
