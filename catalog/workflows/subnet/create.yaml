schema: urn:f5xc:console:workflow:v1
id: subnet-create
label: Create Subnets
resource: subnet
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Subnets name (lowercase alphanumeric and hyphens)
    example: example-subnet
  site_subnet_parameters:
    required: true
    description: Site Subnet Parameters
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/subnets
    wait_for: text('Subnets')
    description: Navigate to Subnets list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Subnet')
    wait_for: textbox[name='Name']
    description: Click the Add Subnet tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-site_subnet_parameters
    action: click
    selector: button:text('Configure')
    context: Site Subnet Parameters section
    description: Open the Site Subnet Parameters configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
