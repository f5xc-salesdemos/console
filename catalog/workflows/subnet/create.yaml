schema: urn:f5xc:console:workflow:v1
id: subnet-create
label: Create Subnets
resource: subnet
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Subnets name (lowercase alphanumeric and hyphens)
    example: example-subnet
  site_subnet_parameters:
    required: true
    description: Site Subnet Parameters
  site_subnet_params:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/subnets
    wait_for: text('Subnets')
    description: Navigate to Subnets list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Subnet')
    wait_for: textbox[name='Name']
    description: Click the Add Subnet tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-site_subnet_parameters
    action: click
    selector: text('Configure')
    context: Site Subnet Parameters section
    description: Open the Site Subnet Parameters configuration ('Configure' is a link, not a button)
  - id: fill-site_subnet_parameters-value
    action: fill
    selector: textbox
    value: "{site_subnet_parameters}"
    description: Enter the Site Subnet Parameters value via the 'site_subnet_parameters' parameter
  - id: configure-site_subnet_params
    action: click
    selector: text('Configure')
    context: Site Subnet Params section
    description: Open the Site Subnet Params configuration ('Configure' is a link, not a button)
  - id: fill-site_subnet_params-value
    action: fill
    selector: textbox
    value: "{site_subnet_params}"
    description: Enter the Site Subnet Params value via the 'site_subnet_params' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
