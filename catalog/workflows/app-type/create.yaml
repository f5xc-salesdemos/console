schema: urn:f5xc:console:workflow:v1
id: app-type-create
label: Create App Types
resource: app-type
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: App Types name (lowercase alphanumeric and hyphens)
    example: example-app-type
  ai_ml_feature_type:
    required: true
    description: "'Field AI/ML Feature Type is required' — nested inside app_type_settings"
  app_type_settings:
    required: true
    description: "Feedback loop: table widget → nested-resource-list (uses Add Item sub-form)"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/security/ai_ml/app_types
    wait_for: text('App Types')
    description: Navigate to App Types list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add App Type')
    wait_for: textbox[name='Name']
    description: Click the Add App Type tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: fill-ai_ml_feature_type
    action: fill
    selector: ngx-datatable input.form-control
    context: AI/ML Feature Type table
    value: "{ai_ml_feature_type}"
    description: Enter AI/ML Feature Type in the existing table row (no Add Item needed — the table ships one empty row)
  - id: add-app_type_settings
    action: click
    selector: button:text('Add Item')
    context: App Type Settings section
    description: Add App Type Settings entry
    then:
      - id: fill-app_type_settings-value
        action: fill
        selector: textbox
        value: "{app_type_settings}"
        description: Fill the first required field in the App Type Settings sub-form (the agent should provide a value via the
          'app_type_settings' parameter)
      - id: apply-app_type_settings
        action: click
        selector: button:text('Apply')
        description: Confirm App Type Settings entry
  - id: select-ai_ml_feature_type
    action: select
    selector: listbox
    context: AI/ML Feature Type section
    value: "{ai_ml_feature_type}"
    description: Select AI/ML Feature Type
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
