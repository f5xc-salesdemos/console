schema: urn:f5xc:console:workflow:v1
id: network-connector-create
label: Create Network Connectors
resource: network-connector
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Connectors name (lowercase alphanumeric and hyphens)
    example: example-network-connector
  select_network_connector_type:
    required: false
    description: Select Network Connector Type
    default: SNAT, Site Local Inside to Site Local Outside
  routing_mode:
    required: false
    description: Routing Mode
    default: Default Gateway
  snat_source_ip_selection:
    required: false
    description: SNAT Source IP Selection
    default: Interface IP
  select_forward_proxy:
    required: false
    description: Select Forward Proxy
    default: Disable Forward Proxy
  connector_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/network_connectors
    wait_for: text('Network Connectors')
    description: Navigate to Network Connectors list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Network Connector')
    wait_for: textbox[name='Name']
    description: Click the Add Network Connector tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_network_connector_type
    action: select
    selector: listbox
    context: Select Network Connector Type section
    value: "{select_network_connector_type}"
    description: Select Select Network Connector Type
    condition: params.select_network_connector_type is set
  - id: select-routing_mode
    action: select
    selector: listbox
    context: Routing Mode section
    value: "{routing_mode}"
    description: Select Routing Mode
    condition: params.routing_mode is set
  - id: select-snat_source_ip_selection
    action: select
    selector: listbox
    context: SNAT Source IP Selection section
    value: "{snat_source_ip_selection}"
    description: Select SNAT Source IP Selection
    condition: params.snat_source_ip_selection is set
  - id: select-select_forward_proxy
    action: select
    selector: listbox
    context: Select Forward Proxy section
    value: "{select_forward_proxy}"
    description: Select Select Forward Proxy
    condition: params.select_forward_proxy is set
  - id: configure-connector_choice
    action: click
    selector: text('Configure')
    context: Connector Choice section
    description: Open the Connector Choice configuration ('Configure' is a link, not a button)
  - id: fill-connector_choice-value
    action: fill
    selector: textbox
    value: "{connector_choice}"
    description: Enter the Connector Choice value via the 'connector_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
