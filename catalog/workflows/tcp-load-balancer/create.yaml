schema: urn:xcsh:console:workflow:v1
id: tcp-load-balancer-create
label: Create TCP Load Balancers
resource: tcp-load-balancer
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: TCP Load Balancers name (lowercase alphanumeric and hyphens)
    example: example-tcp-load-balancer
  domains:
    required: true
    description: TCP LB Domains table starts EMPTY (0 items) — needs Add Item click before filling. Fills via ngx-datatable
      grid real-typing after row creation.
  listen_port_value:
    required: true
    description: Listen Port (value)
  listen_port:
    required: false
    description: vsui listbox choice (Listen Port | Custom Port). Verified from docs/form-discovery/tcp_loadbalancer.yaml.
    default: Listen Port
    example: Listen Port
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/tcp_loadbalancers
    wait_for: text('TCP Load Balancers')
    description: Navigate to TCP Load Balancers list page
  - id: click-add-tab
    action: click
    selector: text('Add TCP Load Balancer')
    wait_for: textbox[name='Name']
    description: Click Add TCP Load Balancer to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-item-domains
    action: click
    selector: button:text('Add Item')
    context: Domains table
    description: Add a row to the Domains table (starts empty — unlike most tables)
  - id: fill-domains
    action: fill
    selector: ngx-datatable input.form-control
    context: Domains table
    value: "{domains}"
    description: Enter Domains in the newly-added table row (Add Item clicked above)
  - id: fill-listen_port_value
    action: fill
    selector: spinbutton[name='Listen Port (value)']
    value: "{listen_port_value}"
    description: Set Listen Port (value)
  - id: select-listen_port
    action: select
    selector: listbox
    context: Listen Port section
    value: "{listen_port}"
    description: Select Listen Port (Listen Port | Custom Port)
    condition: params.listen_port is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
