schema: urn:f5xc:console:workflow:v1
id: cloud-credentials-create
label: Create Cloud Credentials
resource: cloud-credentials
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Cloud Credentials name (lowercase alphanumeric and hyphens)
    example: example-cloud-credentials
  select_cloud_credential_type:
    required: false
    description: Select Cloud Credential Type
    default: AWS Programmatic Access Credentials
  access_key_id:
    required: true
    description: Access Key ID
  secret_access_key:
    required: true
    description: Secret Access Key
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/other_configs/cloud_credential
    wait_for: text('Cloud Credentials')
    description: Navigate to Cloud Credentials list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Cloud Credential')
    wait_for: textbox[name='Name']
    description: Click the Add Cloud Credential tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_cloud_credential_type
    action: select
    selector: listbox
    context: Select Cloud Credential Type section
    value: "{select_cloud_credential_type}"
    description: Select Select Cloud Credential Type
    condition: params.select_cloud_credential_type is set
  - id: fill-access_key_id
    action: fill
    selector: textbox[name='Access Key ID']
    value: "{access_key_id}"
    description: Enter Access Key ID
  - id: configure-secret_access_key
    action: click
    selector: button:text('Configure')
    context: Secret Access Key section
    description: Open the Secret Access Key configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
