schema: urn:xcsh:console:workflow:v1
id: cloud-credentials-create
label: Create Cloud Credentials
resource: cloud-credentials
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Cloud Credentials name (lowercase alphanumeric and hyphens)
    example: example-cloud-credentials
  select_cloud_credential_type:
    required: false
    description: Select Cloud Credential Type
    default: AWS Programmatic Access Credentials
  access_key_id:
    required: true
    description: Access Key ID
  secret_access_key:
    required: true
    description: Secret Access Key
  cloud:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/other_configs/cloud_credential
    wait_for: text('Cloud Credentials')
    description: Navigate to Cloud Credentials list page
  - id: click-add-tab
    action: click
    selector: text('Add Cloud Credentials')
    wait_for: textbox[name='Name']
    description: Click Add Cloud Credential to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_cloud_credential_type
    action: select
    selector: listbox
    context: Select Cloud Credential Type section
    value: "{select_cloud_credential_type}"
    description: Select Select Cloud Credential Type
    condition: params.select_cloud_credential_type is set
  - id: fill-access_key_id
    action: fill
    selector: textbox[name='Access Key ID']
    value: "{access_key_id}"
    description: Enter Access Key ID
  - id: configure-secret_access_key
    action: click
    selector: text('Configure')
    context: Secret Access Key section
    description: Open the Secret Access Key configuration ('Configure' is a link, not a button)
  - id: fill-secret_access_key-value
    action: fill
    selector: textbox
    value: "{secret_access_key}"
    description: Enter the Secret Access Key value via the 'secret_access_key' parameter
  - id: configure-cloud
    action: click
    selector: text('Configure')
    context: Cloud section
    description: Open the Cloud configuration ('Configure' is a link, not a button)
  - id: fill-cloud-value
    action: fill
    selector: textbox
    value: "{cloud}"
    description: Enter the Cloud value via the 'cloud' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Click-add-tab selector fixed from form-discovery. Promoted to validated to survive regen.
