schema: "urn:f5xc:console:workflow:v1"
id: "namespace-create"
label: "Create Namespace"
resource: "namespace"
operation: "create"

preconditions:
  - "user_logged_in"
  - "role_minimum: admin"

params:
  name:
    required: true
    description: "Namespace name (lowercase alphanumeric and hyphens)"
    example: "example-namespace"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/administration/personal-management/namespaces"
    wait_for: "text('My Namespaces')"
    description: "Navigate to My Namespaces list page within Administration workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "tab:text('Add Namespace')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add Namespace tab to open the inline create form"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the namespace name in the Name textbox"

  - id: "save"
    action: "click"
    selector: "button:text('Add Namespace')"
    context: "footer"
    wait_for: "text('{name}')"
    wait_timeout_ms: 30000
    description: "Click the Add Namespace button in the form footer to save"

  - id: "verify-created"
    action: "assert"
    selector: "text('{name}')"
    description: "Verify the resource was created by checking the name appears in the list"

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 15
  notes: "System-level resource — no namespace param required. Selectors use aria/text-based patterns validated against live console."
