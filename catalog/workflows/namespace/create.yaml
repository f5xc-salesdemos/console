schema: urn:f5xc:console:workflow:v1
id: namespace-create
label: Create My Namespaces
resource: namespace
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: My Namespaces name (lowercase alphanumeric and hyphens)
    example: example-namespace
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/administration/personal-management/namespaces
    wait_for: text('My Namespaces')
    description: Navigate to My Namespaces list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Namespace')
    wait_for: textbox[name='Name']
    description: Click the Add Namespace tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
