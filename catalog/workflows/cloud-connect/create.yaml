schema: urn:f5xc:console:workflow:v1
id: cloud-connect-create
label: Create Cloud Connects
resource: cloud-connect
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Cloud Connects name (lowercase alphanumeric and hyphens)
    example: example-cloud-connect
  provider:
    required: false
    description: Provider
    default: AWS
  site_reference:
    required: true
    description: Site Reference
  credential_reference:
    required: true
    description: Credential Reference
  spoke_vpcs:
    required: true
    description: Spoke VPCs
  segment:
    required: true
    description: Segment
  cloud:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/connectors/cloud_connect
    wait_for: text('Cloud Connects')
    description: Navigate to Cloud Connects list page
  - id: click-add-tab
    action: click
    selector: text('Add Cloud Connect')
    wait_for: textbox[name='Name']
    description: Click Add Cloud Connect to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-provider
    action: select
    selector: listbox
    context: Provider section
    value: "{provider}"
    description: Select Provider
    condition: params.provider is set
  - id: select-site_reference
    action: select
    selector: listbox
    context: Site Reference section
    value: "{site_reference}"
    description: Select Site Reference
  - id: select-credential_reference
    action: select
    selector: listbox
    context: Credential Reference section
    value: "{credential_reference}"
    description: Select Credential Reference
  - id: configure-spoke_vpcs
    action: click
    selector: text('Configure')
    context: Spoke VPCs section
    description: Open the Spoke VPCs configuration ('Configure' is a link, not a button)
  - id: fill-spoke_vpcs-value
    action: fill
    selector: textbox
    value: "{spoke_vpcs}"
    description: Enter the Spoke VPCs value via the 'spoke_vpcs' parameter
  - id: select-segment
    action: select
    selector: listbox
    context: Segment section
    value: "{segment}"
    description: Select Segment
  - id: configure-cloud
    action: click
    selector: text('Configure')
    context: Cloud section
    description: Open the Cloud configuration ('Configure' is a link, not a button)
  - id: fill-cloud-value
    action: fill
    selector: textbox
    value: "{cloud}"
    description: Enter the Cloud value via the 'cloud' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
