schema: urn:xcsh:console:workflow:v1
id: service-policy-rule-create
label: Create Service Policy Rules
resource: service-policy-rule
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Service Policy Rules name (lowercase alphanumeric and hyphens)
    example: example-service-policy-rule
  waf_action:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/service_policies/service_policy_rules
    wait_for: text('Service Policy Rules')
    description: Navigate to Service Policy Rules list page
  - id: click-add-tab
    action: click
    selector: text('Add Service Policy Rule')
    wait_for: textbox[name='Name']
    description: Click Add Service Policy Rule to open the create form
  - id: configure-waf_action
    action: click
    selector: text('Configure')
    context: Waf Action section
    description: Open the Waf Action configuration ('Configure' is a link, not a button)
  - id: fill-waf_action-value
    action: fill
    selector: textbox
    value: "{waf_action}"
    description: Enter the Waf Action value via the 'waf_action' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
