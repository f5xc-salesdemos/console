schema: urn:xcsh:console:workflow:v1
id: ip-prefix-set-create
label: Create IP Prefix Sets
resource: ip-prefix-set
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: IP Prefix Sets name (lowercase alphanumeric and hyphens)
    example: example-ip-prefix-set
  prefix:
    required: true
    description: IPv4 CIDR for the pre-seeded prefix row
    default: "10.10.0.0/24"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/ip_prefix_sets
    wait_for: text('IP Prefix Sets')
    description: Navigate to IP Prefix Sets list page
  - id: click-add-tab
    action: click
    selector: text('Add IP Prefix Set')
    wait_for: textbox[name='Name']
    description: Click Add IP Prefix Set to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-ipv4-row
    action: click
    selector: button:text('Add Item')
    context: IPv4 Prefixes section
    description: "Click Add Item to instantiate the IPv4 Prefix datatable row (the editable cell input does not exist until then)"
  - id: fill-prefix-value
    action: fill
    selector: "input[placeholder='IPv4 Prefix']"
    value: "{prefix}"
    description: "Fill the IPv4 Prefix datatable cell. Datatable cell inputs have NO accessible name but their placeholder equals the column name → target by placeholder."
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: "Table inline-fill fix — fill pre-seeded row, no Add Item (avoids duplicate empty row). Promoted to validated to survive regen pending generator-level table-behavior fix."
