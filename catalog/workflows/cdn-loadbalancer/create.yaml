schema: urn:xcsh:console:workflow:v1
id: cdn-loadbalancer-create
label: Create CDN Distributions
resource: cdn-loadbalancer
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: CDN Distributions name (lowercase alphanumeric and hyphens)
    example: example-cdn-loadbalancer
  domains:
    required: true
    description: Domains
    default: test.example.com
  load_balancer_type:
    required: false
    description: Load Balancer Type
    default: HTTPS with Automatic Certificate
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/cdn/distributions
  wait_for: text('CDN Distributions')
  description: Navigate to CDN Distributions list page
- id: click-add-tab
  action: click
  selector: text('Add CDN Distribution')
  wait_for: textbox[name='Name']
  description: Click Add CDN Distribution to open the create form
- id: fill-name
  action: fill
  selector: textbox[name='Name']
  value: '{name}'
  description: Enter Name
- id: fill-domains
  action: fill
  selector: ngx-datatable input.form-control
  context: Domains table
  value: '{domains}'
  description: "Enter Domains in the existing table row (no Add Item needed \u2014 the table ships one empty row)"
- id: configure-cdn-origin-pool
  action: click
  selector: text('Configure')
  context: CDN Origin Pool section
  description: "Open the CDN Origin Pool Configure sub-form (required \u2014 inline configuration, not a reference)"
  then:
    - id: fill-origin-dns
      action: fill
      selector: textbox[name='DNS Name']
      value: '{domains}'
      description: "Enter the origin server DNS name"
    - id: apply-origin-pool
      action: click
      selector: button:text('Apply')
      description: "Confirm CDN Origin Pool configuration"
- id: select-load_balancer_type
  action: select
  selector: listbox
  context: Load Balancer Type section
  value: '{load_balancer_type}'
  description: Select Load Balancer Type
  condition: params.load_balancer_type is set
- id: save
  action: click
  selector: '[class*=''save-bt''],[class*=''submit-button'']'
  context: footer
  wait_for: text('{name}')
  wait_timeout_ms: 30000
  description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
