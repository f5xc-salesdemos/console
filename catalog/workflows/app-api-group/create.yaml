schema: urn:f5xc:console:workflow:v1
id: app-api-group-create
label: Create API Groups
resource: app-api-group
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: API Groups name (lowercase alphanumeric and hyphens)
    example: example-app-api-group
  scope:
    required: false
    description: Scope
    default: HTTP Load Balancer
  http_load_balancer:
    required: true
    description: "Feedback loop: 'Field HTTP Load Balancer in HTTP Load Balancer is required'"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/api_groups
    wait_for: text('API Groups')
    description: Navigate to API Groups list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add API Group')
    wait_for: textbox[name='Name']
    description: Click the Add API Group tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-scope
    action: select
    selector: listbox
    context: Scope section
    value: "{scope}"
    description: Select Scope
    condition: params.scope is set
  - id: select-http_load_balancer
    action: select
    selector: listbox
    context: HTTP Load Balancer section
    value: "{http_load_balancer}"
    description: Select HTTP Load Balancer
  - id: attach-http_load_balancer
    action: click
    selector: button:text('Add Item')
    context: HTTP Load Balancer section
    condition: params.http_load_balancer is set
    description: Attach HTTP Load Balancer (references a http_loadbalancer)
    then:
      - id: select-http_load_balancer
        action: select
        selector: listbox
        context: HTTP Load Balancer selector
        value: "{http_load_balancer}"
        description: Select the HTTP Load Balancer
      - id: apply-http_load_balancer
        action: click
        selector: button:text('Apply')
        description: Confirm HTTP Load Balancer selection
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
