schema: urn:f5xc:console:workflow:v1
id: endpoint-create
label: Create Endpoints
resource: endpoint
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Endpoints name (lowercase alphanumeric and hyphens)
    example: example-endpoint
  protocol:
    required: false
    description: "Server-required: Must be TCP or UDP"
    default: TCP
  virtual_site_or_site_or_network:
    required: false
    description: Virtual-Site or Site or Network
    default: Virtual Site
  reference:
    required: true
    description: vsui autocomplete dropdown (VSUI-AUTOCOMPLETE-DROPDOWN) selecting a virtual-site, site, or network.
      Dependency resource.
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/endpoints
    wait_for: text('Endpoints')
    description: Navigate to Endpoints list page
  - id: click-add-tab
    action: click
    selector: text('Add Endpoint')
    wait_for: textbox[name='Name']
    description: Click Add Endpoint to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-protocol
    action: select
    selector: listbox
    context: Protocol section
    value: "{protocol}"
    description: Select Protocol
    condition: params.protocol is set
  - id: select-virtual_site_or_site_or_network
    action: select
    selector: listbox
    context: Virtual-Site or Site or Network section
    value: "{virtual_site_or_site_or_network}"
    description: Select Virtual-Site or Site or Network
    condition: params.virtual_site_or_site_or_network is set
  - id: select-reference
    action: select
    selector: listbox[name='Reference']
    context: Reference section
    value: "{reference}"
    description: Select Reference (references an existing virtual_site — dependency)
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
