schema: "urn:xcsh:console:workflow:v1"
id: "dns-lb-stack-demo"
label: "DNS Load Balancer Demo — DNS Zone + DNS LB Pool + DNS Load Balancer"
resource:
  - "dns-zone"
  - "dns-lb-pool"
  - "dns-load-balancer"
operation: "demo"

preconditions:
  - "user_logged_in"
  - "role_minimum: admin"

params:
  app_name:
    required: true
    description: "Base name for all resources"
    example: "example-app"
  domain:
    required: true
    description: "DNS zone domain name"
    example: "example.com"
  record_name:
    required: true
    description: "DNS record name to load balance"
    example: "www"
  pool_member_1:
    required: true
    description: "First pool member IP or CNAME"
    example: "1.2.3.4"
  pool_member_2:
    required: false
    description: "Second pool member IP or CNAME"
    example: "5.6.7.8"

steps:
  - id: "screenshot-start"
    action: "screenshot"
    screenshot_name: "dns-demo-start"
    description: "Capture starting state"

  - id: "navigate-dns-zones"
    action: "navigate"
    url: "/web/workspaces/dns-management/manage/zone_management"
    wait_for: "text('DNS Zone Management')"
    description: "Step 1: Navigate to DNS Zone Management (tenant-scoped, no namespace)"

  - id: "click-add-dns-zone"
    action: "click"
    selector: "button:text('Add or Import DNS Zone')"
    description: "Open the Add or Import dropdown"
    note: "DNS Zone uses a dropdown button, not a tab"
    then:
      - id: "select-add-zone"
        action: "click"
        selector: "option:text('Add DNS Zone')"
        wait_for: "textbox[name='Domain Name']"
        description: "Select Add DNS Zone from dropdown"

  - id: "fill-zone-domain"
    action: "fill"
    selector: "textbox[name='Domain Name']"
    value: "{domain}"
    description: "Enter the DNS zone domain name (primary field — not 'Name')"
    note: "DNS Zone uses 'Domain Name' as the primary field, not 'Name'"

  - id: "save-dns-zone"
    action: "click"
    selector: "button:text('Add DNS Zone')"
    context: "footer"
    wait_for: "text('{domain}')"
    wait_timeout_ms: 30000
    description: "Save the DNS Zone"

  - id: "screenshot-zone-created"
    action: "screenshot"
    screenshot_name: "dns-demo-zone-created"
    description: "Capture DNS zone creation"

  - id: "navigate-dns-lb"
    action: "navigate"
    url: "/web/workspaces/dns-management/manage/dns_lb_management/dns_load_balancer"
    wait_for: "text('DNS Load Balancers')"
    description: "Step 2: Navigate to DNS Load Balancers (tenant-scoped)"

  - id: "click-add-dns-lb"
    action: "click"
    selector: "tab:text('Add DNS Load Balancer')"
    wait_for: "textbox[name='Name']"
    description: "Open the Add DNS Load Balancer form"

  - id: "fill-dns-lb-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{app_name}-dns-lb"
    description: "Enter the DNS load balancer name"

  - id: "fill-dns-lb-record"
    action: "fill"
    selector: "textbox"
    context: "Record Name"
    value: "{record_name}"
    description: "Enter the DNS record name to load balance"

  - id: "save-dns-lb"
    action: "click"
    selector: "button:text('Add DNS Load Balancer')"
    context: "footer"
    wait_for: "text('{app_name}-dns-lb')"
    wait_timeout_ms: 30000
    description: "Save the DNS Load Balancer"

  - id: "screenshot-final"
    action: "screenshot"
    screenshot_name: "dns-demo-complete"
    description: "Capture completed DNS LB stack"

postconditions:
  - "resource_name_in_list: {app_name}-dns-lb"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-16"
  validated_at: "2026-06-16"
  console_version: "2025.06"
  estimated_duration_seconds: 90
  notes: >
    Validated on staging 2026-06-16. DNS Management is tenant-scoped (no
    namespace). DNS Zone uses dropdown button "Add or Import DNS Zone" then
    "Add DNS Zone" option — NOT a tab. Primary field is "Domain Name" not
    "Name". DNS LB uses standard tab. Record Type defaults to A. DNS LB
    form has 5 sections: Metadata, Record Type, Load Balancing Rules,
    Response Cache, Fallback Pool.
