schema: "urn:xcsh:console:workflow:v1"
id: "cdn-distribution-demo"
label: "CDN Distribution Demo — Origin Pool + CDN Distribution"
resource:
  - "origin-pool"
  - "cdn-loadbalancer"
operation: "demo"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  app_name:
    required: true
    description: "Base name for all resources"
    example: "example-cdn"
  domain:
    required: true
    description: "Domain for the CDN distribution"
    example: "cdn.example.com"
  origin_server:
    required: true
    description: "DNS hostname of the origin server"
    example: "origin.example.com"

steps:
  - id: "screenshot-start"
    action: "screenshot"
    screenshot_name: "cdn-demo-start"
    description: "Capture starting state"

  - id: "create-origin-pool"
    action: "run-workflow"
    workflow: "origin-pool/create"
    with:
      namespace: "{namespace}"
      name: "{app_name}-origin"
      origin_server: "{origin_server}"
      port: "443"
    description: "Step 1: Create an origin pool for the CDN backend"

  - id: "screenshot-pool-created"
    action: "screenshot"
    screenshot_name: "cdn-demo-pool-created"
    description: "Capture origin pool creation"

  - id: "navigate-cdn"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/cdn/distributions"
    wait_for: "text('CDN Distributions')"
    description: "Step 2: Navigate to CDN Distributions"

  - id: "click-add-cdn"
    action: "click"
    selector: "tab:text('Add CDN Distribution')"
    wait_for: "textbox[name='Name']"
    description: "Open the Add CDN Distribution form"

  - id: "fill-cdn-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{app_name}-cdn"
    description: "Enter the CDN distribution name"

  - id: "add-cdn-domain"
    action: "click"
    selector: "button:text('Add Item')"
    context: "Domains table"
    description: "Add a domain to the CDN distribution"
    then:
      - id: "fill-cdn-domain"
        action: "fill"
        selector: "textbox"
        context: "Domains table row"
        value: "{domain}"
        description: "Enter the CDN domain"

  - id: "save-cdn"
    action: "click"
    selector: "button:text('Add CDN Distribution')"
    context: "footer"
    wait_for: "text('{app_name}-cdn')"
    wait_timeout_ms: 30000
    description: "Save the CDN Distribution"

  - id: "screenshot-final"
    action: "screenshot"
    screenshot_name: "cdn-demo-complete"
    description: "Capture completed CDN stack"

postconditions:
  - "resource_name_in_list: {app_name}-cdn"
  - "origin_pool_exists: {app_name}-origin"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-16"
  validated_at: "2026-06-16"
  console_version: "2025.06"
  estimated_duration_seconds: 60
  notes: >
    Validated on staging 2026-06-16. CDN Distributions at /cdn/distributions
    (not /cdn/cdn_loadbalancers). Standard tab "Add CDN Distribution". Form
    has 9 sections including WAF/API/DoS (EA preview). CDN Origin Pool is
    a Configure link (nested form). WAAP preview dialog appears on first open.
    Domains use same table pattern as HTTP LB.
