schema: urn:f5xc:console:workflow:v1
id: k8s-cluster-create
label: Create K8s Clusters
resource: k8s-cluster
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: K8s Clusters name (lowercase alphanumeric and hyphens)
    example: example-k8s-cluster
steps:
