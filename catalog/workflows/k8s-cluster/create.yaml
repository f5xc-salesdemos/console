    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/manage/virtual_k8s/k8s_clusters
    wait_for: text('K8s Clusters')
    description: Navigate to K8s Clusters list page
  - id: click-add-tab
    action: click
    selector: text('Add K8s Cluster')
    wait_for: textbox[name='Name']
    description: Click Add K8s Cluster to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
