schema: urn:f5xc:console:workflow:v1
id: api-discovery-create
label: Create API Discovery
resource: api-discovery
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: API Discovery name (lowercase alphanumeric and hyphens)
    example: example-api-discovery
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/api_discovery
    wait_for: text('API Discovery')
    description: Navigate to API Discovery list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add API Discovery Policy')
    wait_for: textbox[name='Name']
    description: Click the Add API Discovery Policy tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
