schema: urn:f5xc:console:workflow:v1
id: dns-lb-health-check-create
label: Create DNS Load Balancer Health Checks
resource: dns-lb-health-check
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: DNS Load Balancer Health Checks name (lowercase alphanumeric and hyphens)
    example: example-dns-lb-health-check
  health_check_type:
    required: false
    description: Health Check Type
    default: HTTP Health Check
  health_check_port:
    required: false
    description: Health Check Port
    default: "0"
  virtual_host:
    required: false
    description: Virtual Host
    default: Disable Virtual Host
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/dns_lb_health_check
    wait_for: text('DNS Load Balancer Health Checks')
    description: Navigate to DNS Load Balancer Health Checks list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add DNS LB Health Check')
    wait_for: textbox[name='Name']
    description: Click the Add DNS LB Health Check tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-health_check_type
    action: select
    selector: listbox
    context: Health Check Type section
    value: "{health_check_type}"
    description: Select Health Check Type
    condition: params.health_check_type is set
  - id: select-health_check_port
    action: select
    selector: listbox
    context: Health Check Port section
    value: "{health_check_port}"
    description: Select Health Check Port
    condition: params.health_check_port is set
  - id: select-virtual_host
    action: select
    selector: listbox
    context: Virtual Host section
    value: "{virtual_host}"
    description: Select Virtual Host
    condition: params.virtual_host is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
