schema: urn:f5xc:console:workflow:v1
id: fast-acl-create
label: Create Fast ACLs
resource: fast-acl
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Fast ACLs name (lowercase alphanumeric and hyphens)
    example: example-fast-acl
  select_site_type_for_acl:
    required: false
    description: Select Site Type For acl
    default: Site Type Regional Edge
  site_type_regional_edge:
    required: true
    description: Site Type Regional Edge
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/fast_acls
    wait_for: text('Fast ACLs')
    description: Navigate to Fast ACLs list page
  - id: click-add-tab
    action: click
    selector: tab:text('Add Fast ACL')
    wait_for: textbox[name='Name']
    description: Click the Add Fast ACL tab to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_site_type_for_acl
    action: select
    selector: listbox
    context: Select Site Type For acl section
    value: "{select_site_type_for_acl}"
    description: Select Select Site Type For acl
    condition: params.select_site_type_for_acl is set
  - id: configure-site_type_regional_edge
    action: click
    selector: button:text('Configure')
    context: Site Type Regional Edge section
    description: Open the Site Type Regional Edge configuration (required field). The sub-form must be filled for save to succeed.
  - id: save
    action: click
    selector: "[class*='save-bt']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save via the footer button (never use button:text — it collides with the header tab)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: generated
  console_version: "2025.06"
  generated_by: scripts/generate-workflows.ts
