schema: urn:xcsh:console:workflow:v1
id: fast-acl-create
label: Create Fast ACLs
resource: fast-acl
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Fast ACLs name (lowercase alphanumeric and hyphens)
    example: example-fast-acl
  select_site_type_for_acl:
    required: false
    description: Select Site Type For acl
    default: Site Type Regional Edge
  site_type_regional_edge:
    required: true
    description: Site Type Regional Edge
  site_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/firewall/fast_acls
    wait_for: text('Fast ACLs')
    description: Navigate to Fast ACLs list page
  - id: click-add-tab
    action: click
    selector: text('Add Fast ACL')
    wait_for: textbox[name='Name']
    description: Click Add Fast ACL to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_site_type_for_acl
    action: select
    selector: listbox
    context: Select Site Type For acl section
    value: "{select_site_type_for_acl}"
    description: Select Select Site Type For acl
    condition: params.select_site_type_for_acl is set
  - id: select-site_type_regional_edge
    action: select
    selector: listbox
    context: Site Type Regional Edge section
    value: "{site_type_regional_edge}"
    description: Select Site Type Regional Edge
  - id: select-site_choice
    action: select
    selector: listbox
    context: Site Choice section
    value: "{site_choice}"
    description: Select Site Choice
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
