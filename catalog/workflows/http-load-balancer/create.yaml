schema: "urn:f5xc:console:workflow:v1"
id: "http-load-balancer-create"
label: "Create HTTP Load Balancer"
resource: "http-load-balancer"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Load balancer name (lowercase alphanumeric and hyphens)"
    example: "my-http-lb"
  domains:
    required: true
    type: "string[]"
    description: "One or more domains"
    example: ["app.example.com"]
  origin_pool:
    required: false
    description: "Existing origin pool name to attach"
    example: "my-origin-pool"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/load-balancers/http"
    wait_for: "[data-testid='add-http-lb']"
    description: "Navigate to HTTP Load Balancer list page"

  - id: "click-add"
    action: "click"
    selector: "[data-testid='add-http-lb']"
    wait_for: "input[data-testid='name-input']"
    description: "Click Add HTTP Load Balancer button to open the create form"

  - id: "fill-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: "{name}"
    description: "Enter the load balancer name"

  - id: "fill-domains"
    action: "fill-list"
    selector: "[data-testid='domains-input']"
    values: "{domains}"
    description: "Add each domain entry"

  - id: "attach-origin-pool"
    condition: "params.origin_pool is set"
    action: "click"
    selector: "[data-testid='add-origin-pool']"
    wait_for: "[data-testid='origin-pool-selector']"
    description: "Open origin pool attachment panel"
    then:
      - id: "select-pool"
        action: "select"
        selector: "[data-testid='origin-pool-selector']"
        value: "{origin_pool}"
        description: "Select the named origin pool from the list"

      - id: "apply-pool"
        action: "click"
        selector: "[data-testid='apply-btn']"
        wait_for: "[data-testid='origin-pool-row']"
        description: "Confirm origin pool selection"

  - id: "save"
    action: "click"
    selector: "[data-testid='save-and-exit']"
    wait_for: "[data-testid='resource-detail']"
    wait_timeout_ms: 30000
    description: "Save the load balancer and wait for the detail page"

  - id: "verify-created"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{name}"
    description: "Verify the resource was created by checking the name on the detail page"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 30
  notes: "Selectors are placeholders — must be validated against the live console"
