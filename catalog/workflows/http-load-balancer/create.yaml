schema: "urn:xcsh:console:workflow:v1"
id: "http-load-balancer-create"
label: "Create HTTP Load Balancer"
resource: "http-load-balancer"
operation: "create"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"

params:
  namespace:
    required: true
    description: "Target namespace"
    example: "demo"
  name:
    required: true
    description: "Load balancer name (lowercase alphanumeric and hyphens)"
    example: "example-http-lb"
  domains:
    required: true
    type: "string[]"
    description: "One or more domains"
    example: ["app.example.com"]
  origin_pool:
    required: false
    description: "Existing origin pool name to attach"
    example: "example-origin-pool"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/http_loadbalancers"
    wait_for: "text('HTTP Load Balancers')"
    description: "Navigate to HTTP Load Balancer list page within Web App & API Protection workspace"

  - id: "click-add-tab"
    action: "click"
    selector: "tab:text('Add HTTP Load Balancer')"
    wait_for: "textbox[name='Name']"
    description: "Click the Add HTTP Load Balancer tab to open the inline create form"
    note: "This is a tab element, not a button"

  - id: "fill-name"
    action: "fill"
    selector: "textbox[name='Name']"
    value: "{name}"
    description: "Enter the load balancer name in the Name textbox"

  - id: "fill-domain"
    action: "fill"
    selector: "ngx-datatable input.form-control-md"
    context: "Domains table"
    value: "{domains}"
    description: "Enter the domain in the Domains table's default row. The table ships one empty row, so no Add Item click is needed; clicking Add Item would create a second empty row that fails the 'Domains is required' validation."
    note: "Single-domain create. Multiple domains (Add Item per additional row) is a follow-up."

  - id: "attach-origin-pool"
    condition: "params.origin_pool is set"
    action: "click"
    selector: "button:text('Add Item')"
    context: "Origin Pools section"
    wait_for: "listbox"
    description: "Click Add Item in the Origin Pools section to add an origin pool"
    then:
      - id: "select-pool"
        action: "select"
        selector: "listbox"
        context: "Origin Pool selector"
        value: "{origin_pool}"
        description: "Select the named origin pool from the dropdown"

      - id: "apply-pool"
        action: "click"
        selector: "button:text('Apply')"
        description: "Confirm origin pool selection"

  - id: "save"
    action: "click"
    selector: "[class*='save-bt']"
    wait_for: "text('{name}')"
    wait_timeout_ms: 30000
    description: "Click the Add HTTP Load Balancer button to save. The 'button' role disambiguates the footer save button from the tab of the same name, so no section context is needed. The wait_for confirms the new resource's name appears in the list, which is the creation verification."

postconditions:
  - "resource_list_page_visible"
  - "resource_name_in_list: {name}"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-18"
  console_version: "2025.06"
  estimated_duration_seconds: 30
  notes: "Selectors use aria/text-based patterns validated against the live console (single-domain create persisted, API parity confirmed). No data-testid attributes exist. The Domains field is a vsui-input over ngx-datatable whose patched value descriptor requires the automation engine to commit via the native value setter + blur (see xcsh browser core)."
