schema: "urn:xcsh:console:workflow:v1"
id: "http-load-balancer-clone"
label: "Clone HTTP Load Balancer"
resource: "http-load-balancer"
operation: "clone"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "role_minimum: admin"
  - "resource_exists: {name}"

params:
  namespace:
    required: true
    description: "Namespace containing the source load balancer"
    example: "demo"
  name:
    required: true
    description: "Name of the source load balancer to clone"
    example: "example-http-lb"
  new_name:
    required: true
    description: "Name for the cloned load balancer"
    example: "example-http-lb-copy"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/load-balancers/http"
    wait_for: "[data-testid='resource-table']"
    description: "Navigate to HTTP Load Balancer list page"

  - id: "find-row"
    action: "assert"
    selector: "[data-testid='resource-row-{name}']"
    expected_text: "{name}"
    description: "Locate the source resource row in the table"

  - id: "open-actions"
    action: "click"
    selector: "[data-testid='resource-row-{name}'] [data-testid='row-actions']"
    wait_for: "[data-testid='action-clone']"
    description: "Open the row actions menu"

  - id: "click-clone"
    action: "click"
    selector: "[data-testid='action-clone']"
    wait_for: "input[data-testid='name-input']"
    description: "Click Clone to open the clone form pre-filled with source values"

  - id: "clear-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: ""
    description: "Clear the pre-filled name field"

  - id: "fill-new-name"
    action: "fill"
    selector: "input[data-testid='name-input']"
    value: "{new_name}"
    description: "Enter the new name for the cloned load balancer"

  - id: "save"
    action: "click"
    selector: "[data-testid='save-and-exit']"
    wait_for: "[data-testid='resource-detail']"
    wait_timeout_ms: 30000
    description: "Save the cloned load balancer and wait for the detail page"

  - id: "verify-cloned"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{new_name}"
    description: "Verify the cloned resource was created with the new name"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {new_name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 20
  notes: "Selectors are placeholders — must be validated against the live console"
