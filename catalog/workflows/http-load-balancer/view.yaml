schema: "urn:xcsh:console:workflow:v1"
id: "http-load-balancer-view"
label: "View HTTP Load Balancer"
resource: "http-load-balancer"
operation: "read"

preconditions:
  - "user_logged_in"
  - "namespace_selected"
  - "resource_exists: {name}"

params:
  namespace:
    required: true
    description: "Namespace containing the load balancer"
    example: "demo"
  name:
    required: true
    description: "Name of the load balancer to view"
    example: "example-http-lb"

steps:
  - id: "navigate-to-list"
    action: "navigate"
    url: "/web/namespace/{namespace}/load-balancers/http"
    wait_for: "[data-testid='resource-table']"
    description: "Navigate to HTTP Load Balancer list page"

  - id: "find-row"
    action: "assert"
    selector: "[data-testid='resource-row-{name}']"
    expected_text: "{name}"
    description: "Locate the target resource row in the table"

  - id: "click-name-link"
    action: "click"
    selector: "[data-testid='resource-row-{name}'] [data-testid='resource-name-link']"
    wait_for: "[data-testid='resource-detail']"
    description: "Click the resource name link to open the detail page"

  - id: "wait-for-detail"
    action: "wait"
    selector: "[data-testid='resource-detail']"
    wait_timeout_ms: 15000
    description: "Wait for the resource detail page to fully load"

  - id: "assert-name"
    action: "assert"
    selector: "[data-testid='resource-name']"
    expected_text: "{name}"
    description: "Verify the correct resource name is displayed on the detail page"

  - id: "assert-summary-tab"
    action: "assert"
    selector: "[data-testid='tab-summary']"
    description: "Verify the Summary tab is present"

  - id: "assert-json-tab"
    action: "assert"
    selector: "[data-testid='tab-json']"
    description: "Verify the JSON tab is present"

  - id: "assert-documentation-tab"
    action: "assert"
    selector: "[data-testid='tab-documentation']"
    description: "Verify the Documentation tab is present"

postconditions:
  - "resource_detail_page_visible"
  - "resource_name_matches: {name}"

metadata:
  confidence: "draft"
  discovered_at: "2026-06-15"
  console_version: "2025.06"
  estimated_duration_seconds: 10
  notes: "Selectors are placeholders — must be validated against the live console"
