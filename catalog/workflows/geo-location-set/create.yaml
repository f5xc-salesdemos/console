schema: urn:f5xc:console:workflow:v1
id: geo-location-set-create
label: Create Geo-Location Sets
resource: geo-location-set
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Geo-Location Sets name (lowercase alphanumeric and hyphens)
    example: example-geo-location-set
  geolocation_label_selector:
    required: false
    description: Geolocation Label Selector
    default: Global Geolocation
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/geo_location_set
    wait_for: text('Geo-Location Sets')
    description: Navigate to Geo-Location Sets list page
  - id: click-add-tab
    action: click
    selector: text('Add Geo-Location Set')
    wait_for: textbox[name='Name']
    description: Click Add Geo-Location Set to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-geolocation_label_selector
    action: select
    selector: listbox
    context: Geolocation Label Selector section
    value: "{geolocation_label_selector}"
    description: Select Geolocation Label Selector
    condition: params.geolocation_label_selector is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
