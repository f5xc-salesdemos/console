schema: "urn:f5xc:console:resource:v1"
id: "http-load-balancer"
label: "HTTP Load Balancer"

api:
  kind: "http_loadbalancer"
  group: "ves.io.schema.views"
  version: "v1"
  api_spec_file: "docs-cloud-f5-com.public.ves.io.schema.views.http_loadbalancer.ves-swagger.json"
  crud_endpoints:
    create: "POST /api/config/namespaces/{namespace}/http_loadbalancers"
    read: "GET /api/config/namespaces/{namespace}/http_loadbalancers/{name}"
    update: "PUT /api/config/namespaces/{namespace}/http_loadbalancers/{name}"
    delete: "DELETE /api/config/namespaces/{namespace}/http_loadbalancers/{name}"
    list: "GET /api/config/namespaces/{namespace}/http_loadbalancers"

console:
  list_route: "routes/load-balancers/http-load-balancers.yaml"
  detail_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/http_loadbalancers/{name}"
  create_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/http_loadbalancers"
  create_note: "Create form opens inline via Add tab on the list page, not a separate route"

  navigation:
    workspace: "web-app-and-api-protection"
    menu_path: ["Web App & API Protection", "Manage", "Load Balancers", "HTTP Load Balancers"]
    product_area: "load-balancers"
    breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "Load Balancers", "HTTP Load Balancers"]

workflows:
  create: "workflows/http-load-balancer/create.yaml"
  view: "workflows/http-load-balancer/view.yaml"
  edit: "workflows/http-load-balancer/edit.yaml"
  delete: "workflows/http-load-balancer/delete.yaml"
  clone: "workflows/http-load-balancer/clone.yaml"

form:
  tabs: ["Form", "Documentation", "JSON"]
  footer_buttons:
    - id: "cancel"
      label: "Cancel All"
    - id: "save"
      label: "Add HTTP Load Balancer"
  sections:
    - id: "metadata"
      label: "Metadata"
      fields:
        - id: "name"
          label: "Name"
          type: "textbox"
          required: true
          api_field: "metadata.name"
          validation:
            pattern: "^[a-z][a-z0-9-]*$"
            max_length: 64
        - id: "labels"
          label: "Labels"
          type: "key-value-pairs"
          required: false
          api_field: "metadata.labels"
          add_action: "Add Label"
        - id: "description"
          label: "Description"
          type: "textbox"
          required: false
          api_field: "metadata.description"

    - id: "domains-and-lb-type"
      label: "Domains and LB Type"
      fields:
        - id: "domains"
          label: "Domains"
          type: "table"
          required: true
          api_field: "spec.domains"
          add_action: "Add Item"
          description: "One or more domains this load balancer serves"
        - id: "load_balancer_type"
          label: "Load Balancer Type"
          type: "listbox"
          required: true
          default: "HTTPS with Automatic Certificate"
          options:
            - "HTTP"
            - "HTTPS with Automatic Certificate"
            - "HTTPS with Custom Certificate"
          api_field: "spec.https_auto_cert"
        - id: "http_redirect"
          label: "HTTP Redirect"
          type: "checkbox"
          required: false
          default: false
        - id: "hsts"
          label: "HSTS"
          type: "checkbox"
          required: false
          default: false
        - id: "https_listen_port"
          label: "HTTPS Listen Port"
          type: "spinbutton"
          required: false
          default: 443
          api_field: "spec.https_auto_cert.http_redirect"
        - id: "tls_security_level"
          label: "TLS Security Level"
          type: "listbox"
          required: false
          default: "High"
          options:
            - "Low"
            - "Medium"
            - "High"
        - id: "http_protocol_config"
          label: "HTTP Protocol Config"
          type: "listbox"
          required: false
          default: "HTTP/1.1 and HTTP/2"
          options:
            - "HTTP/1.1"
            - "HTTP/2"
            - "HTTP/1.1 and HTTP/2"

    - id: "origins"
      label: "Origins"
      fields:
        - id: "origin_pools"
          label: "Origin Pools"
          type: "nested-resource-list"
          required: false
          api_field: "spec.default_route_pools"
          add_action: "Add Item"
          nested_resource: "origin-pool"
      show_advanced_fields: true

    - id: "routes"
      label: "Routes"
      fields:
        - id: "routes"
          label: "Routes"
          type: "configurable"
          required: false
          api_field: "spec.routes"
          default_state: "Not configured"
          configure_action: "Configure"

    - id: "cdn"
      label: "CDN"
      fields:
        - id: "caching"
          label: "Caching"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"

    - id: "waf"
      label: "Web Application Firewall"
      fields:
        - id: "waf"
          label: "WAF"
          type: "listbox"
          required: false
          default: "Disable"
          api_field: "spec.app_firewall"
          options:
            - "Disable"
            - "Enable"
        - id: "waf_exclusion"
          label: "WAF Exclusion"
          type: "listbox"
          required: false
          default: "Inline Rules"
          options:
            - "Inline Rules"
            - "Custom Rules"
        - id: "data_guard_rules"
          label: "Data Guard Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "csrf_protection"
          label: "CSRF Protection"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "graphql_inspection"
          label: "GraphQL Inspection"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "cookie_protection"
          label: "Cookie Protection"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"

    - id: "bot-protection"
      label: "Bot Protection"
      fields:
        - id: "bot_defense"
          label: "Bot Defense"
          type: "listbox"
          required: false
          default: "Disable"
          api_field: "spec.bot_defense"
          options:
            - "Disable"
            - "Enable"
      show_advanced_fields: true

    - id: "api-protection"
      label: "API Protection"
      fields:
        - id: "api_definition"
          label: "API Definition"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "api_protection_rules"
          label: "API Protection Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "jwt_validation"
          label: "JWT Validation"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "api_discovery"
          label: "API Discovery"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "sensitive_data_discovery"
          label: "Sensitive Data Discovery"
          type: "listbox"
          required: false
          default: "Default"
          options:
            - "Default"
            - "Custom"
        - id: "api_testing"
          label: "API Testing"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "sensitive_data_exposure_rules"
          label: "Sensitive Data Exposure Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"

    - id: "malware-protection"
      label: "Malware Protection"
      disabled: true
      disabled_reason: "Upgrade required"

    - id: "dos-settings"
      label: "DoS Settings"
      fields:
        - id: "mitigation_action"
          label: "Mitigation Action"
          type: "listbox"
          required: false
          default: "Block"
          options:
            - "Block"
            - "None"
            - "JavaScript Challenge"
            - "Captcha Challenge"
        - id: "rps_threshold"
          label: "RPS Threshold"
          type: "listbox"
          required: false
          default: "Default"
          options:
            - "Default"
            - "Custom"
        - id: "client_side_challenge"
          label: "Client-Side Challenge"
          type: "listbox"
          required: false
          default: "None"
          options:
            - "None"
            - "JavaScript Challenge"
            - "Captcha Challenge"
        - id: "custom_service_policy"
          label: "Custom Service Policy"
          type: "listbox"
          required: false
          default: "None"
          options:
            - "None"
            - "Custom"
        - id: "ddos_mitigation_rules"
          label: "DDoS Mitigation Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "slow_ddos_mitigation"
          label: "Slow DDoS Mitigation"
          type: "listbox"
          required: false
          default: "Default"
          options:
            - "Default"
            - "Custom"

    - id: "client-side-defense"
      label: "Client-Side Defense"
      disabled: true
      disabled_reason: "Upgrade required"

    - id: "common-security-controls"
      label: "Common Security Controls"
      fields:
        - id: "service_policies"
          label: "Service Policies"
          type: "listbox"
          required: false
          default: "Apply Namespace Service Policies"
          options:
            - "Apply Namespace Service Policies"
            - "Do Not Apply Service Policies"
            - "Apply Specified Service Policies"
        - id: "ip_reputation"
          label: "IP Reputation"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "threat_mesh"
          label: "Threat Mesh"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "user_identifier"
          label: "User Identifier"
          type: "listbox"
          required: false
          default: "Client IP Address"
          options:
            - "Client IP Address"
            - "TLS Fingerprint"
            - "Custom"
        - id: "malicious_user_detection"
          label: "Malicious User Detection"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "malicious_user_mitigation"
          label: "Malicious User Mitigation"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "rate_limiting"
          label: "Rate Limiting"
          type: "listbox"
          required: false
          default: "Disable"
          api_field: "spec.rate_limiter"
          options:
            - "Disable"
            - "Enable"
        - id: "trusted_client_rules"
          label: "Trusted Client Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "client_blocking_rules"
          label: "Client Blocking Rules"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"
        - id: "cors_policy"
          label: "CORS Policy"
          type: "configurable"
          required: false
          default_state: "Not configured"
          configure_action: "Configure"

    - id: "other-settings"
      label: "Other Settings"
      fields:
        - id: "vip_advertisement"
          label: "VIP Advertisement"
          type: "listbox"
          required: false
          default: "Internet"
          api_field: "spec.advertise_on_public"
          options:
            - "Internet"
            - "Internet with VIP on RE"
            - "Custom"
        - id: "lb_algorithm"
          label: "LB Algorithm"
          type: "listbox"
          required: false
          default: "Round Robin"
          options:
            - "Round Robin"
            - "Least Active Request"
            - "Random"
            - "Source IP Stickiness"
            - "Cookie Stickiness"
            - "Ring Hash"
        - id: "trusted_client_ip_headers"
          label: "Trusted Client IP Headers"
          type: "listbox"
          required: false
          default: "Disable"
          options:
            - "Disable"
            - "Enable"
        - id: "add_location"
          label: "Add Location"
          type: "checkbox"
          required: false
          default: true
        - id: "more_options"
          label: "More Options"
          type: "expandable"
          required: false

metadata:
  confidence: "validated"
