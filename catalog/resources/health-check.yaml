schema: "urn:f5xc:console:resource:v1"
id: "health-check"
label: "Health Check"

api:
  kind: "healthcheck"
  group: "ves.io.schema"
  version: "v1"
  api_spec_file: "docs-cloud-f5-com.public.ves.io.schema.healthcheck.ves-swagger.json"
  crud_endpoints:
    create: "POST /api/config/namespaces/{namespace}/healthchecks"
    read: "GET /api/config/namespaces/{namespace}/healthchecks/{name}"
    update: "PUT /api/config/namespaces/{namespace}/healthchecks/{name}"
    delete: "DELETE /api/config/namespaces/{namespace}/healthchecks/{name}"
    list: "GET /api/config/namespaces/{namespace}/healthchecks"

console:
  list_route: "routes/load-balancers/health-checks.yaml"
  detail_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks/{name}"
  create_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/health_checks"
  create_note: "Create form opens inline via Add tab on the list page, not a separate route"

  navigation:
    workspace: "web-app-and-api-protection"
    menu_path: ["Web App & API Protection", "Manage", "Load Balancers", "Health Checks"]
    product_area: "load-balancers"
    breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "Load Balancers", "Health Checks"]

workflows:
  create: "workflows/health-check/create.yaml"
  delete: "workflows/health-check/delete.yaml"

form:
  tabs: ["Form", "Documentation", "JSON"]
  footer_buttons:
    - id: "cancel"
      label: "Cancel All"
    - id: "save"
      label: "Add Health Check"
  sections:
    - id: "metadata"
      label: "Metadata"
      fields:
        - id: "name"
          label: "Name"
          type: "textbox"
          required: true
          api_field: "metadata.name"
          validation:
            pattern: "^[a-z][a-z0-9-]*$"
            max_length: 64
        - id: "labels"
          label: "Labels"
          type: "key-value-pairs"
          required: false
          api_field: "metadata.labels"
          add_action: "Add Label"
        - id: "description"
          label: "Description"
          type: "textbox"
          required: false
          api_field: "metadata.description"

    - id: "health-check-parameters"
      label: "Health Check Parameters"
      fields:
        - id: "health_check_type"
          label: "Health Check type"
          type: "listbox"
          required: false
          default: "HTTP HealthCheck"
          api_field: "spec.http_health_check"
          options:
            - "HTTP HealthCheck"
            - "TCP HealthCheck"
        - id: "timeout"
          label: "Timeout"
          type: "spinbutton"
          required: false
          default: 3
          api_field: "spec.timeout"
        - id: "interval"
          label: "Interval"
          type: "spinbutton"
          required: false
          default: 15
          api_field: "spec.interval"
        - id: "unhealthy_threshold"
          label: "Unhealthy Threshold"
          type: "spinbutton"
          required: false
          default: 1
          api_field: "spec.unhealthy_threshold"
        - id: "healthy_threshold"
          label: "Healthy Threshold"
          type: "spinbutton"
          required: false
          default: 3
          api_field: "spec.healthy_threshold"
      show_advanced_fields: true

  list_table:
    columns:
      - id: "name"
        label: "Name"
      - id: "namespace"
        label: "Namespace"
      - id: "interval"
        label: "Interval"
      - id: "jitter_percent"
        label: "Jitter Percent"
      - id: "timeout"
        label: "Timeout"
      - id: "unhealthy_threshold"
        label: "Unhealthy Threshold"
      - id: "healthy_threshold"
        label: "Healthy Threshold"
      - id: "actions"
        label: "Actions"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "All 2 form sections validated via live browser session against staging console. Has Show Advanced Fields toggle."
