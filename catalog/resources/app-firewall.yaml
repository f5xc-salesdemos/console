schema: "urn:f5xc:console:resource:v1"
id: "app-firewall"
label: "App Firewall"

api:
  kind: "app_firewall"
  group: "ves.io.schema"
  version: "v1"
  api_spec_file: "docs-cloud-f5-com.public.ves.io.schema.app_firewall.ves-swagger.json"
  crud_endpoints:
    create: "POST /api/config/namespaces/{namespace}/app_firewalls"
    read: "GET /api/config/namespaces/{namespace}/app_firewalls/{name}"
    update: "PUT /api/config/namespaces/{namespace}/app_firewalls/{name}"
    delete: "DELETE /api/config/namespaces/{namespace}/app_firewalls/{name}"
    list: "GET /api/config/namespaces/{namespace}/app_firewalls"

console:
  list_route: "routes/security/app-firewalls.yaml"
  detail_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/app_firewall/{name}"
  create_route_pattern: "/web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/app_firewall"
  create_note: "Create form opens inline via Add tab on the list page, not a separate route"

  navigation:
    workspace: "web-app-and-api-protection"
    menu_path: ["Web App & API Protection", "Manage", "App Firewall"]
    product_area: "security"
    breadcrumbs: ["Home", "Web App & API Protection", "{namespace}", "Manage", "App Firewall"]

workflows:
  create: "workflows/app-firewall/create.yaml"
  delete: "workflows/app-firewall/delete.yaml"

form:
  tabs: ["Form", "Documentation", "JSON"]
  footer_buttons:
    - id: "cancel"
      label: "Cancel All"
    - id: "save"
      label: "Add App Firewall"
  sections:
    - id: "metadata"
      label: "Metadata"
      fields:
        - id: "name"
          label: "Name"
          type: "textbox"
          required: true
          api_field: "metadata.name"
          validation:
            pattern: "^[a-z][a-z0-9-]*$"
            max_length: 64
        - id: "labels"
          label: "Labels"
          type: "key-value-pairs"
          required: false
          api_field: "metadata.labels"
          add_action: "Add Label"
        - id: "description"
          label: "Description"
          type: "textbox"
          required: false
          api_field: "metadata.description"

    - id: "enforcement-mode"
      label: "Enforcement Mode"
      fields:
        - id: "enforcement_mode"
          label: "Enforcement Mode"
          type: "listbox"
          required: false
          default: "Monitoring"
          options:
            - "Monitoring"
            - "Blocking"
          api_field: "spec.enforcement_mode"

    - id: "security-policy-settings"
      label: "Security Policy Settings"
      fields:
        - id: "security_policy"
          label: "Security Policy"
          type: "listbox"
          required: false
          default: "Default"
          api_field: "spec.detection_settings"
        - id: "enhance_with_ai"
          label: "Enhance with AI"
          type: "listbox"
          required: false
          default: "Disable"

    - id: "advanced-configuration"
      label: "Advanced configuration"
      fields:
        - id: "allowed_response_status_codes"
          label: "Allowed Response Status Codes"
          type: "listbox"
          required: false
          default: "Default"
        - id: "mask_sensitive_parameters"
          label: "Mask Sensitive Parameters"
          type: "listbox"
          required: false
          default: "Default"
        - id: "blocking_response_page"
          label: "Blocking Response Page"
          type: "listbox"
          required: false
          default: "Default"

metadata:
  confidence: "validated"
  discovered_at: "2026-06-15"
  validated_at: "2026-06-15"
  console_version: "2025.06"
  notes: "All 4 form sections validated via live browser session against staging console"
