resource: service_credential
workspace: administration
route: /iam/service_credentials
namespace_scoped: false
add_action: tab "Add Credential"
discovered_at: "2026-06-17"
form_pattern: modal-dialog
note: >
  Opens as a modal dialog (like api_credential). Has Cancel/Download buttons.
  Includes group assignment and role/namespace assignment tables.

footer_buttons:
  - Cancel
  - Download

sections:
  - id: credential-form
    label: Add Service Credentials
    fields:
      - name: Credential Email
        widget: textbox
        required: true
        note: "Generates a service email address (suffix: @volterracredentials.io)"
      - name: Credential Type
        widget: listbox
        required: true
        default: "API Certificate"
        note: "Options: API Certificate, API Token, Kubeconfig"
      - name: Password
        widget: textbox
        required: true
      - name: Confirm Password
        widget: textbox
        required: true
      - name: Expiry Date
        widget: textbox
        required: true

  - id: group-assignment
    label: Assign Service Credential to Group
    fields:
      - name: Groups
        widget: table
        items: 0
        add_action: "Assign Service Credential to Group"

  - id: role-namespace-assignment
    label: Assign Roles and Namespaces
    fields:
      - name: Roles and Namespaces
        widget: table
        items: 1
        columns:
          - Namespace
          - Role
        add_action: "Assign Roles and Namespaces"

summary:
  section_count: 3
  field_count: 8
  listbox_count: 1
  textbox_count: 4
  table_count: 2
  form_pattern: modal-dialog
  note: "Modal dialog for service credential creation with group/role/namespace assignment."
