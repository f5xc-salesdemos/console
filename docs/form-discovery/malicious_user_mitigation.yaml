resource: malicious_user_mitigation
workspace: web-app-and-api-protection
route: /namespaces/{namespace}/manage/shared_objects/malicious_user_mitigation
add_action: tab "Add Malicious User Mitigation"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add Malicious User Mitigation

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: rules
    label: Rules
    required: true
    fields:
      - name: Rules
        widget: table
        items: 0
        add_action: Add Item
        note: "Each rule defines mitigation actions (e.g., JavaScript challenge, captcha, block) for different threat levels"

summary:
  section_count: 2
  field_count: 4
  table_count: 1
