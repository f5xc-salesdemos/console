resource: waf_exclusion_policy
workspace: web-app-and-api-protection
route: /namespaces/{namespace}/manage/shared_objects/waf_exclusion_policy
add_action: tab "Add WAF Exclusion Policy"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add WAF exclusion policy

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: waf-exclusion-rules
    label: WAF Exclusion Rules
    required: true
    fields:
      - name: WAF Exclusion Rules
        widget: configure-link
        state: "Not configured"
        action: "Configure"
        note: "Opens nested form to define WAF exclusion rules (match criteria, excluded WAF rule IDs, domains, paths)"

summary:
  section_count: 2
  field_count: 4
  nested_form_count: 1
