resource: secret_policy
workspace: multi-cloud-network-connect
route: /manage/secrets/secret_policies
namespace_scoped: false
add_action: tab "Add Secret Policy"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add Secret policy

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: allow-f5xc
    label: Allow F5XC
    fields:
      - name: Allow F5XC
        widget: checkbox
        default: false
        note: "When checked, allows F5 XC platform services to access secrets governed by this policy"

  - id: decrypt-cache-timeout
    label: Decrypt Cache Timeout
    fields:
      - name: Decrypt Cache Timeout
        widget: textbox
        note: "Duration string (e.g., '300s', '5m') for how long decrypted secrets are cached"

  - id: select-policy-rules
    label: Select Policy Rules
    fields:
      - name: Select Policy Rules
        widget: listbox
        default: "Custom Rule List"
        note: "Options: Custom Rule List, Deny All"
      - name: Rules
        widget: configure-link
        state: "Not configured"
        action: "Configure"
        note: "Opens nested form to define allow/deny rules for secret access"

summary:
  section_count: 4
  field_count: 6
  listbox_count: 1
  checkbox_count: 1
  nested_form_count: 1
