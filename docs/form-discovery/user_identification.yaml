resource: user_identification
workspace: web-app-and-api-protection
route: /namespaces/{namespace}/manage/shared_objects/user_identification
add_action: tab "Add User Identification"
discovered_at: "2026-06-17"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add User Identification

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Description
        widget: textbox

  - id: user-identification-rules
    label: User Identification Rules
    required: true
    fields:
      - name: User Identification Rules
        widget: configure-link
        state: "Not configured"
        action: "Configure"
        note: "Opens nested form to define rules for identifying users (by IP, header, cookie, etc.)"

summary:
  section_count: 2
  field_count: 4
  nested_form_count: 1
