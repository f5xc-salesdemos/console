resource: voltstack_site
workspace: multi-cloud-network-connect
route: /manage/site_management/cloud_sites/appstack_site
namespace_scoped: false
add_action: tab "Add App Stack Site"
discovered_at: "2026-06-17"
note: "Console labels this as 'App Stack Sites' — API kind is voltstack_site"
form_tabs:
  - Form
  - Documentation
  - JSON
footer_buttons:
  - Cancel All
  - Add App Stack Site

sections:
  - id: metadata
    label: Metadata
    fields:
      - name: Name
        widget: textbox
        required: true
      - name: Namespace
        widget: textbox
        note: "Unique — most resources don't expose Namespace in the create form"
      - name: Labels
        widget: label-adder
        action: Add Label
      - name: Annotations
        widget: configure-link
        state: "Not configured"
        action: "Configure"
      - name: Description
        widget: textbox
      - name: Disable
        widget: checkbox
        default: false

  - id: basic-configuration
    label: Basic Configuration
    fields:
      - name: Generic Server Certified Hardware
        widget: listbox
        required: true
        default: "isv-8000-series-voltstack-combo"
        note: "Hardware profile — determines node capabilities"
      - name: Master Nodes
        widget: table
        required: true
        items: 1
        columns:
          - "*Name"
          - "Public IP"
          - Actions
        row_fields:
          - name: Name
            widget: textbox
          - name: Public IP
            widget: textbox
        add_action: Add Item
      - name: Worker Nodes
        widget: table
        items: 0
        add_action: Add Item
      - name: Geographical Address
        widget: textbox
      - name: Latitude
        widget: textbox
        default: "0"
      - name: Longitude
        widget: textbox
        default: "0"

  - id: bond-configuration
    label: Bond Configuration
    fields:
      - name: Bond Configuration
        widget: listbox
        required: true
        default: "No Bond Devices"

  - id: network-configuration
    label: Network Configuration
    fields:
      - name: Configure Networking
        widget: listbox
        required: true
        default: "Default Network Configuration"

  - id: storage-configuration
    label: Storage Configuration
    fields:
      - name: Configure Storage
        widget: listbox
        required: true
        default: "Default Storage Configuration"

  - id: advanced-configuration
    label: Advanced Configuration
    has_advanced_toggle: true
    fields:
      - name: "Enable/Disable GPU"
        widget: listbox
        required: true
        default: "GPU Disabled"
      - name: Site Local K8s API access
        widget: listbox
        required: true
        default: "Disable Site Local K8s API access"
      - name: Logs Streaming
        widget: listbox
        required: true
        default: "Disable Logs Streaming"
      - name: USB Device Policy
        widget: listbox
        required: true
        default: "Deny All USB Devices"
      - name: F5XC Software Version
        widget: listbox
        required: true
        default: "Latest SW Version"
      - name: Operating System Version
        widget: listbox
        required: true
        default: "Latest OS Version"
      - name: Node by Node Upgrade
        widget: listbox
        required: true
        default: "Enable"
      - name: Upgrade Wait Time
        widget: spinbutton
        required: true
        default: 300
        unit: seconds
      - name: Node Batch Size
        widget: listbox
        required: true
        default: "Node Batch Size Count"
      - name: Node Batch Size Count
        widget: spinbutton
        required: true
        default: 1
      - name: "Enable/Disable VMs support"
        widget: listbox
        default: "VMs support Disabled"
      - name: Blocked Services
        widget: listbox
        required: true
        default: "Default Blocked Service Configuration"
      - name: SR-IOV interfaces
        widget: listbox
        required: true
        default: "Disable SR-IOV interfaces"

summary:
  section_count: 6
  field_count: 27
  listbox_count: 16
  textbox_count: 6
  spinbutton_count: 2
  table_count: 2
  checkbox_count: 1
  nested_form_count: 1
  has_advanced_toggle: true
  note: "Most complex form found — 27 fields across 6 sections. 16 listboxes in Advanced Configuration alone. Unique fields: Namespace textbox in Metadata, Master/Worker Nodes tables with Name+Public IP per row, Geographical Address with lat/lng coordinates, hardware profile selector."
