resource: api_credential
workspace: administration
route: /personal-management/api_credentials
namespace_scoped: false
add_action: button "Add Credentials"
discovered_at: "2026-06-17"
form_pattern: modal-dialog
note: >
  Opens as a modal dialog (not the standard tab form pattern). Has Cancel/Download
  buttons instead of Cancel All/Add. Credential is downloaded immediately on creation.

footer_buttons:
  - Cancel
  - Download

sections:
  - id: credential-form
    label: Add Credentials
    fields:
      - name: Credential Name
        widget: textbox
        required: true
      - name: Credential Type
        widget: listbox
        required: true
        default: "API Certificate"
        note: "Options: API Certificate, API Token, Kubeconfig"
      - name: Password
        widget: textbox
        required: true
        note: "Password-masked input"
      - name: Confirm Password
        widget: textbox
        required: true
      - name: Expiry Date
        widget: textbox
        required: true
        note: "Date picker for credential expiration"

summary:
  section_count: 1
  field_count: 5
  listbox_count: 1
  textbox_count: 4
  form_pattern: modal-dialog
  note: "Modal dialog form — unique to Administration. Download action instead of Add."
