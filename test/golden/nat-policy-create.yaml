schema: urn:f5xc:console:workflow:v1
id: nat-policy-create
label: Create NAT Policies
resource: nat-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: NAT Policies name (lowercase alphanumeric and hyphens)
    example: example-nat-policy
  applies_to:
    required: false
    description: Applies To
    default: Site
  applies_to_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/network_configuration/nat_policy
    wait_for: text('NAT Policies')
    description: Navigate to NAT Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add NAT Policy')
    wait_for: textbox[name='Name']
    description: Click Add NAT Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-applies_to
    action: select
    selector: listbox
    context: Applies To section
    value: "{applies_to}"
    description: Select Applies To
    condition: params.applies_to is set
  - id: configure-applies_to_choice
    action: click
    selector: text('Configure')
    context: Applies To Choice section
    description: Open the Applies To Choice configuration ('Configure' is a link, not a button)
  - id: fill-applies_to_choice-value
    action: fill
    selector: textbox
    value: "{applies_to_choice}"
    description: Enter the Applies To Choice value via the 'applies_to_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
