schema: urn:f5xc:console:workflow:v1
id: user-identification-create
label: Create User Identifications
resource: user-identification
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: User Identifications name (lowercase alphanumeric and hyphens)
    example: example-user-identification
  rules:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/user_identification
    wait_for: text('User Identifications')
    description: Navigate to User Identifications list page
  - id: click-add-tab
    action: click
    selector: text('Add User Identification')
    wait_for: textbox[name='Name']
    description: Click Add User Identification to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-rules
    action: click
    selector: text('Configure')
    context: Rules section
    description: Open the Rules configuration ('Configure' is a link, not a button)
  - id: fill-rules-value
    action: fill
    selector: textbox
    value: "{rules}"
    description: Enter the Rules value via the 'rules' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
