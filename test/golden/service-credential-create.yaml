schema: urn:xcsh:console:workflow:v1
id: service-credential-create
label: Create Service Credentials
resource: service-credential
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Service Credentials name (lowercase alphanumeric and hyphens)
    example: example-service-credential
  credential_email:
    required: true
    description: Credential name prefix (becomes <prefix>@volterracredentials.io). DNS-1035 format, NOT an email.
    default: xcsh-test-cred
  credential_type:
    required: false
    description: Credential Type
    default: API Certificate
  password:
    required: true
    description: Password
  confirm_password:
    required: true
    description: Confirm Password
  expiry_date:
    required: true
    description: Expiry Date in MM/DD/YYYY. API Certificate max ~90 days from now. Use today+Nd for a dynamic valid date.
    default: 'today+30d'
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/administration/iam/service_credentials
    wait_for: text('Service Credentials')
    description: Navigate to Service Credentials list page
  - id: click-add-tab
    action: click
    selector: text('Add Service Credentials')
    wait_for: textbox[name='Credential Email']
    description: Click Add Service Credentials to open the create panel
  - id: fill-credential_email
    action: fill
    selector: textbox[name='Credential Email']
    value: "{credential_email}"
    description: Enter Credential Email
  - id: select-credential_type
    action: select
    selector: listbox
    context: Credential Type section
    value: "{credential_type}"
    description: Select Credential Type
    condition: params.credential_type is set
  - id: fill-password
    action: fill
    selector: textbox[name='Password']
    value: "{password}"
    description: Enter Password
  - id: fill-confirm_password
    action: fill
    selector: textbox[name='Confirm Password']
    value: "{confirm_password}"
    description: Enter Confirm Password
  - id: fill-expiry_date
    action: fill
    selector: textbox[name='Expiry Date']
    value: "{expiry_date}"
    description: Enter Expiry Date
  - id: save
    action: click
    selector: text('Download')
    wait_for: text('xcsh-test-cred')
    wait_timeout_ms: 30000
    description: Click Download to generate the service credential. Verify the new credential (prefixed with the credential name) appears in the list.
postconditions:
  - resource_list_page_visible
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
