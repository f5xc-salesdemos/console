schema: urn:xcsh:console:workflow:v1
id: network-policy-create
label: Create Network Policies
resource: network-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Policies name (lowercase alphanumeric and hyphens)
    example: example-network-policy
  endpoint_s:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/manage/network_policies/network_policies
    wait_for: text('Network Policies')
    description: Navigate to Network Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add Network Policy')
    wait_for: textbox[name='Name']
    description: Click Add Network Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-endpoint_s
    action: click
    selector: text('Configure')
    context: Endpoint(s) section
    description: Open the Endpoint(s) configuration ('Configure' is a link, not a button)
  - id: fill-endpoint_s-value
    action: fill
    selector: textbox
    value: "{endpoint_s}"
    description: Enter the Endpoint(s) value via the 'endpoint_s' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
