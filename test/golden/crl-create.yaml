schema: urn:xcsh:console:workflow:v1
id: crl-create
label: Create Certificate Revocation List
resource: crl
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Certificate Revocation List name (lowercase alphanumeric and hyphens)
    example: example-crl
  crl_server_address:
    required: true
    description: CRL Server address
  refresh_interval:
    required: true
    description: 'Server-required: Must be >= 6'
    default: '24'
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/load_balancers/crl
  wait_for: text('Certificate Revocation List')
  description: Navigate to Certificate Revocation List list page
- id: click-add-tab
  action: click
  selector: text('Add Certificate Revocation List')
  wait_for: textbox[name='Name']
  description: Click Add CRL to open the create form
- id: fill-name
  action: fill
  selector: textbox[name='Name']
  value: '{name}'
  description: Enter Name
- id: fill-crl_server_address
  action: fill
  selector: textbox[name='CRL Server address']
  value: '{crl_server_address}'
  description: Enter CRL Server address
- id: fill-refresh_interval
  action: fill
  selector: spinbutton[name='CRL Refresh interval (h)']
  value: '{refresh_interval}'
  description: "Fill CRL Refresh interval (hours) \u2014 it's a spinbutton, not a Configure link"
  condition: params.refresh_interval is set
- id: save
  action: click
  selector: '[class*=''save-bt''],[class*=''submit-button'']'
  context: footer
  wait_for: text('{name}')
  wait_timeout_ms: 30000
  description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Click-add-tab selector fixed from form-discovery. Promoted to validated to survive regen.
