schema: urn:xcsh:console:workflow:v1
id: third-party-application-create
label: Create Third-Party Applications
resource: third-party-application
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Third-Party Applications name (lowercase alphanumeric and hyphens)
    example: example-third-party-application
  application_type:
    required: true
    description: Application Type
  application_configuration:
    required: true
    description: Application Configuration
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/third_party_application
    wait_for: text('Third-Party Applications')
    description: Navigate to Third-Party Applications list page
  - id: click-add-tab
    action: click
    selector: text('Add Third-Party Application')
    wait_for: textbox[name='Name']
    description: Click Add Third-Party Application to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-application_type
    action: select
    selector: listbox
    context: Application Type section
    value: "{application_type}"
    description: Select Application Type
  - id: configure-application_configuration
    action: click
    selector: text('Configure')
    context: Application Configuration section
    description: Open the Application Configuration configuration ('Configure' is a link, not a button)
  - id: fill-application_configuration-value
    action: fill
    selector: textbox
    value: "{application_configuration}"
    description: Enter the Application Configuration value via the 'application_configuration' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
