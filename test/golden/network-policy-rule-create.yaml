schema: urn:xcsh:console:workflow:v1
id: network-policy-rule-create
label: Create Network Policy Rules
resource: network-policy-rule
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Network Policy Rules name (lowercase alphanumeric and hyphens)
    example: example-network-policy-rule
  protocol:
    required: true
    description: "Server-required: Must be ALL/TCP/UDP/ICMP"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/distributed-apps/namespaces/{namespace}/manage/network_policies/network_policy_rules
    wait_for: text('Network Policy Rules')
    description: Navigate to Network Policy Rules list page
  - id: click-add-tab
    action: click
    selector: text('Add Network Policy Rule')
    wait_for: textbox[name='Name']
    description: Click Add Network Policy Rule to open the create form
  - id: configure-protocol
    action: click
    selector: text('Configure')
    context: Protocol section
    description: Open the Protocol configuration ('Configure' is a link, not a button)
  - id: fill-protocol-value
    action: fill
    selector: textbox
    value: "{protocol}"
    description: Enter the Protocol value via the 'protocol' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
