schema: urn:f5xc:console:workflow:v1
id: dns-lb-pool-create
label: Create DNS Load Balancer Pools
resource: dns-lb-pool
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: DNS Load Balancer Pools name (lowercase alphanumeric and hyphens)
    example: example-dns-lb-pool
  pool_members:
    required: true
    description: Pool Members is a nested-resource-list (Add Item, NOT Configure — verified from live form). Default A
      record member needs a Public IP.
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/dns-management/manage/dns_lb_management/dns_lb_pool
    wait_for: text('DNS Load Balancer Pools')
    description: Navigate to DNS Load Balancer Pools list page
  - id: click-add-tab
    action: click
    selector: text('Add DNS Load Balancer Pool')
    wait_for: textbox[name='Name']
    description: Click Add DNS Load Balancer Pool to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: add-pool_members
    action: click
    selector: button:text('Add Item')
    context: Pool Members section
    description: Add Pool Members entry
    then:
      - id: fill-pool_members-value
        action: fill
        selector: textbox[name='Public IP']
        value: "{pool_members}"
        description: Enter Public IP for the Pool Members entry
      - id: apply-pool_members
        action: click
        selector: button:text('Apply')
        description: Confirm Pool Members entry
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
