schema: urn:f5xc:console:workflow:v1
id: rate-limiter-create
label: Create Rate Limiters
resource: rate-limiter
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Rate Limiters name (lowercase alphanumeric and hyphens)
    example: example-rate-limiter
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/shared_objects/rate_limiters
    wait_for: text('Rate Limiters')
    description: Navigate to Rate Limiters list page
  - id: click-add-tab
    action: click
    selector: text('Add Rate Limiter')
    wait_for: textbox[name='Name']
    description: Click Add Rate Limiter to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
