schema: urn:f5xc:console:workflow:v1
id: origin-pool-create
label: Create Origin Pools
resource: origin-pool
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Origin Pools name (lowercase alphanumeric and hyphens)
    example: example-origin-pool
  origin_servers:
    required: true
    description: 'Default type: Public DNS Name. The sub-form requires "DNS Name" (FQDN of the origin).'
  port:
    required: false
    description: Port
    default: 443
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/load_balancers/origin_pools
    wait_for: text('Origin Pools')
    description: Navigate to Origin Pools list page
  - id: click-add-tab
    action: click
    selector: text('Add Origin Pool')
    wait_for: textbox[name='Name']
    description: Click Add Origin Pool to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: "Enter Name (pattern: ^[a-z][a-z0-9-]*$), max 64 chars"
  - id: add-origin_servers
    action: click
    selector: button:text('Add Item')
    context: Origin Servers section
    description: "Add Origin Servers entry (default type: Public DNS Name)"
    then:
      - id: fill-origin_servers-value
        action: fill
        selector: textbox[name='DNS Name']
        value: "{origin_servers}"
        description: Enter DNS Name for the Origin Servers entry
      - id: apply-origin_servers
        action: click
        selector: button:text('Apply')
        description: Confirm Origin Servers entry
  - id: fill-port
    action: fill
    selector: spinbutton[name='Port']
    value: "{port}"
    description: "Set Port (default: 443)"
    condition: params.port is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
