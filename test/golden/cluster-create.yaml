schema: urn:f5xc:console:workflow:v1
id: cluster-create
label: Create Clusters
resource: cluster
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Clusters name (lowercase alphanumeric and hyphens)
    example: example-cluster
  select_upstream_connection_pool_reuse_state:
    required: false
    description: Select upstream connection pool reuse state
    default: Enable Connection Pool Reuse
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-app-connect/namespaces/{namespace}/manage/virtual_host/clusters
    wait_for: text('Clusters')
    description: Navigate to Clusters list page
  - id: click-add-tab
    action: click
    selector: text('Add Cluster')
    wait_for: textbox[name='Name']
    description: Click Add Cluster to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-select_upstream_connection_pool_reuse_state
    action: select
    selector: listbox
    context: Select upstream connection pool reuse state section
    value: "{select_upstream_connection_pool_reuse_state}"
    description: Select Select upstream connection pool reuse state
    condition: params.select_upstream_connection_pool_reuse_state is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
