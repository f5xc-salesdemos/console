schema: urn:xcsh:console:workflow:v1
id: securemesh-site-v2-create
label: Create Secure Mesh Sites v2
resource: securemesh-site-v2
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Secure Mesh Sites v2 name (lowercase alphanumeric and hyphens)
    example: example-securemesh-site-v2
  provider_name:
    required: false
    description: Provider Name
    default: VMWare
  provider_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/cloud_sites/securemesh_site_v2
    wait_for: text('Secure Mesh Sites v2')
    description: Navigate to Secure Mesh Sites v2 list page
  - id: click-add-tab
    action: click
    selector: text('Add Secure Mesh Site')
    wait_for: textbox[name='Name']
    description: Click Add Secure Mesh Site v2 to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-provider_name
    action: select
    selector: listbox
    context: Provider Name section
    value: "{provider_name}"
    description: Select Provider Name
    condition: params.provider_name is set
  - id: configure-provider_choice
    action: click
    selector: text('Configure')
    context: Provider Choice section
    description: Open the Provider Choice configuration ('Configure' is a link, not a button)
  - id: fill-provider_choice-value
    action: fill
    selector: textbox
    value: "{provider_choice}"
    description: Enter the Provider Choice value via the 'provider_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Click-add-tab selector fixed from form-discovery. Promoted to validated to survive regen.
