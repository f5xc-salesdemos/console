schema: urn:xcsh:console:workflow:v1
id: certificate-create
label: Create TLS Certificates
resource: certificate
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: TLS Certificates name (lowercase alphanumeric and hyphens)
    example: example-certificate
  certificate_url:
    required: true
    description: 'Server-required: Minimum bytes of 1'
    default: https://example.com
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/certificate_management/tls_certificate
  wait_for: text('TLS Certificates')
  description: Navigate to TLS Certificates list page
- id: click-add-tab
  action: click
  selector: text('Add TLS Certificate')
  wait_for: textbox[name='Name']
  description: Click Add TLS Certificate to open the create form
- id: fill-name
  action: fill
  selector: textbox[name='Name']
  value: '{name}'
  description: Enter Name
- id: configure-certificate_url
  action: click
  selector: text('Configure')
  context: Certificate Url section
  description: Open the Certificate Url configuration ('Configure' is a link, not a button)
- id: fill-certificate_url-value
  action: fill
  selector: textbox
  value: '{certificate_url}'
  description: Enter the Certificate Url value via the 'certificate_url' parameter
- id: save
  action: click
  selector: '[class*=''save-bt''],[class*=''submit-button'']'
  context: footer
  wait_for: text('{name}')
  wait_timeout_ms: 30000
  description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
