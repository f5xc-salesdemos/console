schema: urn:f5xc:console:workflow:v1
id: usb-policy-create
label: Create USB Policies
resource: usb-policy
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: USB Policies name (lowercase alphanumeric and hyphens)
    example: example-usb-policy
  allowed_usb_devices:
    required: true
    description: Allowed USB devices
  allowed_devices:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/other_configs/usb_policies
    wait_for: text('USB Policies')
    description: Navigate to USB Policies list page
  - id: click-add-tab
    action: click
    selector: text('Add USB Policy')
    wait_for: textbox[name='Name']
    description: Click Add USB Policy to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-allowed_usb_devices
    action: click
    selector: text('Configure')
    context: Allowed USB devices section
    description: Open the Allowed USB devices configuration ('Configure' is a link, not a button)
  - id: fill-allowed_usb_devices-value
    action: fill
    selector: textbox
    value: "{allowed_usb_devices}"
    description: Enter the Allowed USB devices value via the 'allowed_usb_devices' parameter
  - id: configure-allowed_devices
    action: click
    selector: text('Configure')
    context: Allowed Devices section
    description: Open the Allowed Devices configuration ('Configure' is a link, not a button)
  - id: fill-allowed_devices-value
    action: fill
    selector: textbox
    value: "{allowed_devices}"
    description: Enter the Allowed Devices value via the 'allowed_devices' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
