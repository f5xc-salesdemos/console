schema: urn:xcsh:console:workflow:v1
id: address-allocator-create
label: Create IP Address Allocators
resource: address-allocator
operation: create
preconditions:
- user_logged_in
- namespace_selected
- 'role_minimum: admin'
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: IP Address Allocators name (lowercase alphanumeric and hyphens)
    example: example-address-allocator
  address_allocator_mode:
    required: true
    description: Address Allocator Mode
  allocation_unit:
    required: false
    description: Allocation Unit
    default: 1
  address_pool:
    required: true
    description: Address Pool
  address_allocation_scheme:
    required: true
    description: 'Server-required: Field should be not nil'
steps:
- id: navigate-to-list
  action: navigate
  url: /web/workspaces/multi-cloud-network-connect/manage/networking/legacy_network_configuration/address_allocators
  wait_for: text('IP Address Allocators')
  description: Navigate to IP Address Allocators list page
- id: click-add-tab
  action: click
  selector: text('Add Address Allocator')
  wait_for: textbox[name='Name']
  description: Click Add IP Address Allocator to open the create form
- id: fill-name
  action: fill
  selector: textbox[name='Name']
  value: '{name}'
  description: Enter Name
- id: select-address_allocator_mode
  action: select
  selector: listbox
  context: Address Allocator Mode section
  value: '{address_allocator_mode}'
  description: Select Address Allocator Mode
- id: fill-allocation_unit
  action: fill
  selector: spinbutton[name='Allocation Unit']
  value: '{allocation_unit}'
  description: Set Allocation Unit
- id: fill-address_pool
  action: fill
  selector: ngx-datatable input.form-control
  context: Address Pool table
  value: '{address_pool}'
  description: "Enter Address Pool in the existing table row (no Add Item needed \u2014 the table ships one empty row)"
- id: configure-address_allocation_scheme
  action: click
  selector: text('Configure')
  context: Address Allocation Scheme section
  description: Open the Address Allocation Scheme configuration ('Configure' is a link, not a button)
- id: fill-address_allocation_scheme-value
  action: fill
  selector: textbox
  value: '{address_allocation_scheme}'
  description: Enter the Address Allocation Scheme value via the 'address_allocation_scheme' parameter
- id: save
  action: click
  selector: '[class*=''save-bt''],[class*=''submit-button'']'
  context: footer
  wait_for: text('{name}')
  wait_timeout_ms: 30000
  description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
- resource_list_page_visible
- 'resource_name_in_list: {name}'
metadata:
  confidence: validated
  discovered_at: 2026-06-24
  console_version: '2025.06'
  notes: Click-add-tab selector fixed from form-discovery. Promoted to validated to survive regen.
