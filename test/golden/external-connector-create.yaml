schema: urn:f5xc:console:workflow:v1
id: external-connector-create
label: Create External Connectors
resource: external-connector
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: External Connectors name (lowercase alphanumeric and hyphens)
    example: example-external-connector
  ce_site_reference:
    required: true
    description: CE Site Reference
  connection_type:
    required: false
    description: Connection Type
    default: IPSec
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/networking/external_connectivity/external_connector
    wait_for: text('External Connectors')
    description: Navigate to External Connectors list page
  - id: click-add-tab
    action: click
    selector: text('Add External Connector')
    wait_for: textbox[name='Name']
    description: Click Add External Connector to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-ce_site_reference
    action: select
    selector: listbox
    context: CE Site Reference section
    value: "{ce_site_reference}"
    description: Select CE Site Reference
  - id: select-connection_type
    action: select
    selector: listbox
    context: Connection Type section
    value: "{connection_type}"
    description: Select Connection Type
    condition: params.connection_type is set
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
