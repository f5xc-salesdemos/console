schema: urn:xcsh:console:workflow:v1
id: app-type-create
label: Create App Types
resource: app-type
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: App Types name (lowercase alphanumeric and hyphens)
    example: example-app-type
  ai_ml_feature_type:
    required: true
    description: Required Select-item listbox in the Features section (ships with one row). Verified from live form screenshot.
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/shared-configuration/security/ai_ml/app_types
    wait_for: text('App Types')
    description: Navigate to App Types list page
  - id: click-add-tab
    action: click
    selector: text('Add App Type')
    wait_for: textbox[name='Name']
    description: Click Add App Type to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-ai_ml_feature_type
    action: select
    selector: listbox[name='AI/ML Feature Type']
    context: AI/ML Feature Type section
    value: "{ai_ml_feature_type}"
    description: Select AI/ML Feature Type (references an existing ai_feature_type — dependency)
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
