schema: urn:f5xc:console:workflow:v1
id: app-api-group-create
label: Create API Groups
resource: app-api-group
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: API Groups name (lowercase alphanumeric and hyphens)
    example: example-app-api-group
  scope:
    required: false
    description: Scope
    default: HTTP Load Balancer
  http_load_balancer:
    required: true
    description: 'Server-required (feedback loop: "Field HTTP Load Balancer is required"). A direct listbox that selects an
      EXISTING http_loadbalancer — dependency, create an http-lb first. (Removed the duplicate spec.http_load_balancer:
      the real API field is http_loadbalancer, and the console form shows a single listbox, not a resource-selector.)'
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/api_security/api_groups
    wait_for: text('API Groups')
    description: Navigate to API Groups list page
  - id: click-add-tab
    action: click
    selector: text('Add API Group')
    wait_for: textbox[name='Name']
    description: Click Add API Group to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-scope
    action: select
    selector: listbox
    context: Scope section
    value: "{scope}"
    description: Select Scope
    condition: params.scope is set
  - id: select-http_load_balancer
    action: select
    selector: listbox[name='HTTP Load Balancer']
    context: HTTP Load Balancer section
    value: "{http_load_balancer}"
    description: Select HTTP Load Balancer (references an existing http_loadbalancer — dependency)
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
