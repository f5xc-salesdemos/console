schema: urn:xcsh:console:workflow:v1
id: nfv-service-create
label: Create NFV Services
resource: nfv-service
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: NFV Services name (lowercase alphanumeric and hyphens)
    example: example-nfv-service
  external_service_provider:
    required: false
    description: External Service Provider
    default: Virtual BIG-IP on AWS
  provider_configuration:
    required: true
    description: Provider Configuration
  https_based_management_of_nodes:
    required: false
    description: HTTPS Based Management of Nodes
    default: Disable HTTPS Based Management
  ssh_based_management_of_nodes:
    required: false
    description: SSH based management of nodes
    default: Disable SSH access
  service_provider_choice:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/nfv_services
    wait_for: text('NFV Services')
    description: Navigate to NFV Services list page
  - id: click-add-tab
    action: click
    selector: text('Add NFV Service')
    wait_for: textbox[name='Name']
    description: Click Add NFV Service to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-external_service_provider
    action: select
    selector: listbox
    context: External Service Provider section
    value: "{external_service_provider}"
    description: Select External Service Provider
    condition: params.external_service_provider is set
  - id: configure-provider_configuration
    action: click
    selector: text('Configure')
    context: Provider Configuration section
    description: Open the Provider Configuration configuration ('Configure' is a link, not a button)
  - id: fill-provider_configuration-value
    action: fill
    selector: textbox
    value: "{provider_configuration}"
    description: Enter the Provider Configuration value via the 'provider_configuration' parameter
  - id: select-https_based_management_of_nodes
    action: select
    selector: listbox
    context: HTTPS Based Management of Nodes section
    value: "{https_based_management_of_nodes}"
    description: Select HTTPS Based Management of Nodes
    condition: params.https_based_management_of_nodes is set
  - id: select-ssh_based_management_of_nodes
    action: select
    selector: listbox
    context: SSH based management of nodes section
    value: "{ssh_based_management_of_nodes}"
    description: Select SSH based management of nodes
    condition: params.ssh_based_management_of_nodes is set
  - id: configure-service_provider_choice
    action: click
    selector: text('Configure')
    context: Service Provider Choice section
    description: Open the Service Provider Choice configuration ('Configure' is a link, not a button)
  - id: fill-service_provider_choice-value
    action: fill
    selector: textbox
    value: "{service_provider_choice}"
    description: Enter the Service Provider Choice value via the 'service_provider_choice' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
