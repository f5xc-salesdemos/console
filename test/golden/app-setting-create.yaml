schema: urn:f5xc:console:workflow:v1
id: app-setting-create
label: Create App Settings
resource: app-setting
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: App Settings name (lowercase alphanumeric and hyphens)
    example: example-app-setting
  app_type_settings:
    required: true
    description: "Server-required: Minimum items of 1"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/web-app-and-api-protection/namespaces/{namespace}/manage/ai_ml/app_settings
    wait_for: text('App Settings')
    description: Navigate to App Settings list page
  - id: click-add-tab
    action: click
    selector: text('Add App Setting')
    wait_for: textbox[name='Name']
    description: Click Add App Setting to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: configure-app_type_settings
    action: click
    selector: text('Configure')
    context: App Type Settings section
    description: Open the App Type Settings configuration ('Configure' is a link, not a button)
  - id: fill-app_type_settings-value
    action: fill
    selector: textbox
    value: "{app_type_settings}"
    description: Enter the App Type Settings value via the 'app_type_settings' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
