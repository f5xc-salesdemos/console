schema: urn:xcsh:console:workflow:v1
id: azure-vnet-site-create
label: Create Azure VNET Sites
resource: azure-vnet-site
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Azure VNET Sites name (lowercase alphanumeric and hyphens)
    example: example-azure-vnet-site
  azure_region:
    required: true
    description: Azure Region
  azure_credentials:
    required: true
    description: Azure Credentials
  deployment:
    required: true
    description: "Server-required: Field should be not nil"
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/multi-cloud-network-connect/manage/site_management/legacy_configs/azure_site
    wait_for: text('Azure VNET Sites')
    description: Navigate to Azure VNET Sites list page
  - id: click-add-tab
    action: click
    selector: text('Add Azure VNET Site')
    wait_for: textbox[name='Name']
    description: Click Add Azure VNET Site to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Name']
    value: "{name}"
    description: Enter Name
  - id: select-azure_region
    action: select
    selector: listbox
    context: Azure Region section
    value: "{azure_region}"
    description: Select Azure Region
  - id: attach-azure_credentials
    action: click
    selector: button:text('Add Item')
    context: Azure Credentials section
    condition: params.azure_credentials is set
    description: Attach Azure Credentials (references a resource)
    then:
      - id: select-azure_credentials
        action: select
        selector: listbox
        context: Azure Credentials selector
        value: "{azure_credentials}"
        description: Select the Azure Credentials
      - id: apply-azure_credentials
        action: click
        selector: button:text('Apply')
        description: Confirm Azure Credentials selection
  - id: configure-deployment
    action: click
    selector: text('Configure')
    context: Deployment section
    description: Open the Deployment configuration ('Configure' is a link, not a button)
  - id: fill-deployment-value
    action: fill
    selector: textbox
    value: "{deployment}"
    description: Enter the Deployment value via the 'deployment' parameter
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
