schema: urn:f5xc:console:workflow:v1
id: role-create
label: Create Roles
resource: role
operation: create
preconditions:
  - user_logged_in
  - namespace_selected
  - "role_minimum: admin"
params:
  namespace:
    required: true
    description: Target namespace
    example: demo
  name:
    required: true
    description: Roles name (lowercase alphanumeric and hyphens)
    example: example-role
  role_name:
    required: true
    description: Role Name
steps:
  - id: navigate-to-list
    action: navigate
    url: /web/workspaces/administration/iam/roles
    wait_for: text('Roles')
    description: Navigate to Roles list page
  - id: click-add-tab
    action: click
    selector: text('Add Role')
    wait_for: textbox[name='Role Name']
    description: Click Add Role to open the create form
  - id: fill-name
    action: fill
    selector: textbox[name='Role Name']
    value: "{name}"
    description: Enter Role Name
  - id: fill-role_name
    action: fill
    selector: textbox[name='Role Name']
    value: "{role_name}"
    description: Enter Role Name
  - id: save
    action: click
    selector: "[class*='save-bt'],[class*='submit-button']"
    context: footer
    wait_for: text('{name}')
    wait_timeout_ms: 30000
    description: Save/submit the form (union selector matches save-bt OR submit-button)
postconditions:
  - resource_list_page_visible
  - "resource_name_in_list: {name}"
metadata:
  confidence: inferred
  discovered_at: 2026-06-24
  console_version: "2025.06"
  notes: Auto-generated by scripts/generate-workflows.ts from api-specs-enriched field metadata.
